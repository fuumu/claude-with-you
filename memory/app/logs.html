<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>澪の記憶サーバー — Logs</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* Header */
    header {
      background: #010409; border-bottom: 1px solid #21262d;
      padding: .6rem 1.25rem; display: flex; align-items: center; flex-shrink: 0;
    }
    header h1 { font-size: .92rem; color: #58a6ff; }
    .header-right { margin-left: auto; }
    #token-status { font-size: .75rem; color: #484f58; cursor: pointer; }
    #token-status:hover { color: #58a6ff; }

    /* Layout */
    .main { display: flex; flex: 1; overflow: hidden; }

    /* Left sidebar */
    .sidebar {
      width: 310px; min-width: 240px; background: #010409; border-right: 1px solid #21262d;
      display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0;
    }
    .sidebar-controls { padding: .7rem; border-bottom: 1px solid #21262d; flex-shrink: 0; }


    .filter-section { display: flex; flex-direction: column; gap: .38rem; }
    .filter-row { display: flex; gap: .35rem; align-items: center; }
    label { font-size: .72rem; color: #484f58; white-space: nowrap; }

    select, input[type="text"], input[type="date"], input[type="number"] {
      background: #0d1117; border: 1px solid #21262d; border-radius: 5px;
      color: #c9d1d9; font-size: .76rem; padding: .28rem .45rem;
    }
    select:focus, input:focus { outline: none; border-color: #58a6ff; }
    .filter-keyword { flex: 1; }
    /* L1-c: 検索クリア✕ */
    .kw-wrap { position: relative; flex: 1; display: flex; }
    .kw-wrap .filter-keyword { width: 100%; padding-right: 1.4rem; }
    .kw-clear { position: absolute; right: .25rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: #6e7681; cursor: pointer; font-size: .72rem; line-height: 1; padding: .1rem .2rem; }
    .kw-clear:hover { color: #c9d1d9; }

    .conv-count { font-size: .7rem; color: #484f58; padding: .35rem .7rem; border-bottom: 1px solid #21262d; flex-shrink: 0; }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
      padding: .55rem .7rem; border-bottom: 1px solid #0d1117; cursor: pointer;
      transition: background .15s; display: flex; flex-direction: column; gap: .18rem;
    }
    .conv-item:hover { background: #161b22; }
    .conv-item.active { background: #1c2128; border-left: 2px solid #58a6ff; padding-left: calc(.7rem - 2px); }
    .conv-title-row { display: flex; align-items: flex-start; gap: .35rem; }
    .conv-title { font-size: .8rem; line-height: 1.35; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .conv-meta  { font-size: .68rem; color: #484f58; display: flex; justify-content: space-between; }
    /* L1: お気に入り☆ */
    .fav-star { background: none; border: none; cursor: pointer; font-size: .85rem; line-height: 1; color: #484f58; padding: 0; flex-shrink: 0; }
    .fav-star:hover { color: #e3b341; }
    .fav-star.on { color: #e3b341; }
    /* L1: クイックアクセス（最近開いた会話） */
    .quick-access { border-bottom: 1px solid #21262d; }
    .qa-header { font-size: .66rem; color: #6e7681; padding: .35rem .7rem .2rem; display: flex; justify-content: space-between; align-items: center; }
    .qa-item { padding: .3rem .7rem; cursor: pointer; font-size: .74rem; color: #adbac7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; gap: .3rem; align-items: center; }
    .qa-item:hover { background: #161b22; }
    .qa-item .qa-mark { color: #484f58; font-size: .7rem; flex-shrink: 0; }
    .fav-filter-row { display: flex; align-items: center; gap: .35rem; font-size: .72rem; color: #adbac7; cursor: pointer; }
    .fav-filter-row input { cursor: pointer; }

    /* Right pane */
    .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .conv-header {
      padding: .6rem 1.25rem; border-bottom: 1px solid #21262d; flex-shrink: 0;
      display: flex; align-items: center; gap: .75rem; background: #010409;
    }
    .conv-header-info { flex: 1; min-width: 0; }
    .conv-header-title { font-size: .9rem; color: #c9d1d9; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-header-meta  { font-size: .7rem; color: #484f58; margin-top: .1rem; }
    .toggle-btn {
      padding: .28rem .65rem; background: none; border: 1px solid #30363d; border-radius: 5px;
      color: #484f58; cursor: pointer; font-size: .72rem; white-space: nowrap; flex-shrink: 0; transition: all .2s;
    }
    .toggle-btn.active { border-color: #58a6ff; color: #58a6ff; }

    .messages-wrap { flex: 1; overflow-y: auto; padding: .9rem 1.25rem; display: flex; flex-direction: column; gap: .65rem; }

    .empty-state { text-align: center; color: #484f58; padding: 3rem 1rem; display: flex; flex-direction: column; gap: .4rem; align-items: center; }
    .empty-state .icon { font-size: 1.8rem; }
    .empty-state .hint { font-size: .82rem; }

    /* Message bubbles */
    .msg { border-radius: 7px; padding: .65rem .9rem; border: 1px solid; }
    .msg-human     { background: #1c2128; border-color: #30363d; }
    .msg-assistant { background: #161b22; border-color: #1f6feb30; }
    .msg-role      { font-size: .7rem; font-weight: 600; margin-bottom: .35rem; display: flex; justify-content: space-between; }
    .msg-human .msg-role    { color: #58a6ff; }
    .msg-assistant .msg-role { color: #a371f7; }
    .msg-ts { font-size: .65rem; color: #484f58; font-weight: normal; }

    .block-text { font-size: var(--msg-font-size, .9rem); line-height: 1.65; word-break: break-word; }
    .block-text p { margin-bottom: .5rem; }
    .block-text p:last-child { margin-bottom: 0; }
    .block-text h1, .block-text h2, .block-text h3 { margin: .75rem 0 .35rem; color: #58a6ff; }
    .block-text code { background: #161b22; padding: .1rem .3rem; border-radius: 3px; font-size: .85em; }
    .block-text pre  { background: #161b22; padding: .65rem .8rem; border-radius: 5px; overflow-x: auto; margin-bottom: .5rem; }
    .block-text pre code { background: none; padding: 0; }
    .block-text ul, .block-text ol { margin-left: 1.4rem; margin-bottom: .5rem; }
    .block-text li { margin-bottom: .15rem; }
    .block-text table { border-collapse: collapse; width: 100%; margin-bottom: .5rem; font-size: .85em; }
    .block-text th, .block-text td { border: 1px solid #21262d; padding: .3rem .6rem; }
    .block-text th { background: #161b22; }
    .block-text a { color: #58a6ff; }
    .block-text strong { color: #e6edf3; }

    /* Font size controls */
    .font-size-ctrl { display: flex; align-items: center; gap: .3rem; margin-top: .5rem; }
    .font-size-ctrl label { font-size: .72rem; color: #484f58; }
    .fs-btn {
      padding: .22rem .5rem; font-size: .72rem; background: none;
      border: 1px solid #21262d; border-radius: 4px; color: #484f58; cursor: pointer; transition: all .15s;
    }
    .fs-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .fs-btn.active { border-color: #58a6ff; color: #58a6ff; background: #1f6feb20; }

    .block-collapsible { border: 1px solid #21262d; border-radius: 5px; overflow: hidden; margin-top: .38rem; }
    .block-header {
      display: flex; align-items: center; gap: .45rem; padding: .3rem .6rem;
      background: #0d1117; cursor: pointer; font-size: .75rem; color: #484f58;
      user-select: none; transition: background .15s;
    }
    .block-header:hover { background: #161b22; color: #c9d1d9; }
    .chevron { margin-left: auto; font-size: .65rem; transition: transform .2s; display: inline-block; }
    .block-header.open .chevron { transform: rotate(90deg); }
    .block-content { display: none; padding: .55rem .7rem; font-size: .75rem; white-space: pre-wrap; word-break: break-word; background: #0d1117; color: #8b949e; max-height: 280px; overflow-y: auto; }
    .block-content.open { display: block; }
    .tool-input { color: #f0883e; }

    /* U11: 注記表示 */
    .msg-ann, .ann-global { margin-top: .4rem; }
    .ann-global { margin: 0 0 .9rem; }
    .msg-ann .block-header, .ann-global .block-header { color: #d29922; }
    .msg-ann .block-header:hover, .ann-global .block-header:hover { color: #f2cc60; }
    .ann-item { border-left: 2px solid #d29922; padding: .15rem 0 .15rem .6rem; margin: .3rem 0; }
    .ann-meta { font-size: .7rem; color: #d29922; margin-bottom: .2rem; }
    .ann-date { color: #6e7681; }
    .ann-note { font-size: .78rem; color: #c9d1d9; white-space: normal; }

    /* Related memory panel */
    .related-panel {
      border-top: 1px solid #21262d; background: #010409; flex-shrink: 0;
      max-height: 200px; overflow-y: auto;
    }
    .related-header { padding: .45rem 1.25rem; font-size: .72rem; color: #484f58; font-weight: 600; letter-spacing: .04em; border-bottom: 1px solid #21262d; }
    .related-item {
      padding: .42rem 1.25rem; border-bottom: 1px solid #0d1117; cursor: pointer;
      font-size: var(--msg-font-size, .9rem); transition: background .15s; display: flex; gap: .6rem; align-items: center;
    }
    .related-item:hover { background: #161b22; }
    .related-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .related-badge { font-size: .68rem; color: #58a6ff; white-space: nowrap; background: #1f6feb20; padding: .1rem .4rem; border-radius: 3px; }
    .related-empty { padding: .42rem 1.25rem; font-size: var(--msg-font-size, .9rem); color: #484f58; }

    /* Auth overlay */
    .auth-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 200; display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      background: #161b22; border: 1px solid #21262d; border-radius: 12px;
      padding: 2rem 2.5rem; width: 340px;
    }
    .auth-card h2 { font-size: 1.05rem; color: #58a6ff; margin-bottom: .4rem; }
    .auth-card p  { font-size: .82rem; color: #484f58; margin-bottom: 1.4rem; }
    .auth-card input {
      width: 100%; padding: .5rem .7rem; background: #0d1117;
      border: 1px solid #21262d; border-radius: 6px;
      color: #c9d1d9; font-size: .9rem; margin-bottom: .9rem;
    }
    .auth-card input:focus { outline: none; border-color: #58a6ff; }
    .btn { padding: .48rem 1.1rem; background: #238636; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: .88rem; width: 100%; }
    .btn:hover { background: #2ea043; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal { background: #161b22; border: 1px solid #21262d; border-radius: 12px; width: 90%; max-width: 700px; max-height: 78vh; overflow-y: auto; padding: 1.5rem; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .7rem; }
    .modal-title  { font-size: .92rem; line-height: 1.4; flex: 1; padding-right: 1rem; color: #c9d1d9; }
    .modal-close  { background: none; border: none; color: #484f58; cursor: pointer; font-size: 1.1rem; }
    .modal-close:hover { color: #c9d1d9; }
    .modal-meta   { font-size: .76rem; color: #484f58; margin-bottom: .9rem; }
    .modal-body   { font-size: .83rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; color: #8b949e; }
    /* R1: 共通レンダラー(renderMd)でMD表示する際のスタイル */
    .modal-body.md { white-space: normal; color: #adbac7; }
    .modal-body.md h1, .modal-body.md h2, .modal-body.md h3 { margin: .9rem 0 .45rem; color: #58a6ff; font-size: 1em; }
    .modal-body.md p { margin-bottom: .65rem; }
    .modal-body.md code { background: #0d1117; padding: .1rem .3rem; border-radius: 3px; }
    .modal-body.md pre { background: #0d1117; padding: .6rem .8rem; border-radius: 6px; overflow-x: auto; margin-bottom: .65rem; }
    .modal-body.md pre code { background: none; padding: 0; }
    .modal-body.md ul, .modal-body.md ol { margin-left: 1.4rem; margin-bottom: .65rem; }
    .modal-body.md table { border-collapse: collapse; margin-bottom: .65rem; }
    .modal-body.md th, .modal-body.md td { border: 1px solid #30363d; padding: .3rem .6rem; font-size: .92em; }
    .modal-body.md a { color: #58a6ff; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #21262d; border-radius: 3px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(1rem);
      background: #238636; color: #fff; padding: .55rem 1.2rem; border-radius: 8px;
      font-size: .85rem; opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Messages scroll buttons */
    .content { position: relative; }
    .msg-scroll-btns {
      position: absolute; right: 1.1rem; bottom: 1rem; display: none;
      flex-direction: column; gap: .4rem; z-index: 50;
    }
    .msg-scroll-btns.visible { display: flex; }
    .msg-scroll-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: #161b22; border: 1px solid #30363d; color: #8b949e; cursor: pointer; font-size: .8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .msg-scroll-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .msg-scroll-btn.close:hover { border-color: #e5534b; color: #e5534b; }

    /* L1-b: 会話要約パネル（アコーディオン） */
    .summary-panel { border-bottom: 1px solid #21262d; background: #0d1117; flex-shrink: 0; }
    .summary-head { display: flex; align-items: center; gap: .4rem; padding: .5rem .9rem; cursor: pointer; font-size: .76rem; color: #8b949e; user-select: none; }
    .summary-head:hover { color: #c9d1d9; }
    .summary-caret { font-size: .6rem; transition: transform .15s; display: inline-block; }
    .summary-caret.open { transform: rotate(90deg); }
    .summary-tag { color: #484f58; font-size: .7rem; margin-left: auto; }
    .summary-body { padding: .1rem .9rem .8rem 1.5rem; font-size: .82rem; line-height: 1.7; color: #adbac7; max-height: 40vh; overflow-y: auto; }
    .summary-body.md { white-space: normal; }
    .summary-body.md h1, .summary-body.md h2, .summary-body.md h3 { margin: .6rem 0 .35rem; color: #58a6ff; font-size: 1em; }
    .summary-body.md p { margin-bottom: .55rem; }
    .summary-body.md ul, .summary-body.md ol { margin-left: 1.3rem; margin-bottom: .55rem; }
    .summary-body.md code { background: #161b22; padding: .1rem .3rem; border-radius: 3px; }

    /* Right slider panel */
    .right-panel {
      width: 36px; background: #010409; border-left: 1px solid #21262d;
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width .22s ease; overflow: hidden;
    }
    .right-panel.open { width: 280px; }
    .right-panel-toggle {
      padding: .5rem 0; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #484f58; font-size: .85rem; flex-shrink: 0;
      border-bottom: 1px solid #21262d; transition: color .15s; user-select: none;
    }
    .right-panel-toggle:hover { color: #58a6ff; }
    .right-panel-tabs {
      display: flex; border-bottom: 1px solid #21262d; flex-shrink: 0; overflow: hidden;
    }
    .rp-tab {
      flex: 1; padding: .4rem .2rem; font-size: .68rem; text-align: center; cursor: pointer;
      color: #484f58; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap;
    }
    .rp-tab:hover { color: #c9d1d9; }
    .rp-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
    .rp-content { flex: 1; overflow-y: auto; }
    .rp-section { padding: .5rem .65rem; }
    .rp-item {
      padding: .42rem .5rem; border-bottom: 1px solid #0d1117; font-size: .75rem;
      color: #8b949e; cursor: pointer; line-height: 1.35;
    }
    .rp-item:hover { color: #c9d1d9; background: #0d1117; }
    .rp-item-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rp-item-meta  { font-size: .66rem; color: #484f58; margin-top: .15rem; }
    .rp-empty { padding: .75rem .65rem; font-size: .75rem; color: #484f58; }
    .rp-loading { padding: .75rem .65rem; font-size: .75rem; color: #484f58; }
  </style>
</head>
<body>

<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <h2 data-i18n="auth.title">澪の記憶サーバー</h2>
    <p data-i18n="auth.prompt">会話ログを読み込むにはAPIトークンが必要です</p>
    <input type="password" id="token-input" placeholder="mio2026..." autocomplete="current-password">
    <button class="btn" onclick="saveToken()" data-i18n="auth.connect">接続</button>
  </div>
</div>

<header>
  <h1 data-i18n="app.title">澪の記憶サーバー — Logs</h1>
  <div class="header-right">
    <span id="token-status" onclick="resetToken()" data-i18n="token.change">トークン変更</span>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-controls">
      <div id="load-status" style="font-size:.72rem;color:#484f58;margin-bottom:.5rem;"></div>
      <div class="filter-section">
        <div class="filter-row">
          <label data-i18n="sort">並び順</label>
          <select id="sort-select" onchange="applyFilters()" style="flex:1">
            <option value="updated_desc" data-i18n="sort.ud">更新日 新→古</option>
            <option value="updated_asc" data-i18n="sort.ua">更新日 古→新</option>
            <option value="created_desc" data-i18n="sort.cd">作成日 新→古</option>
            <option value="created_asc" data-i18n="sort.ca">作成日 古→新</option>
          </select>
        </div>
        <div class="filter-row">
          <label data-i18n="search">検索</label>
          <div class="kw-wrap">
            <input type="text" id="keyword-input" class="filter-keyword" placeholder="キーワード..." data-i18n-ph="search.ph" oninput="onKeywordInput()">
            <button class="kw-clear" id="kw-clear" onclick="clearKeyword()" title="クリア" style="display:none">✕</button>
          </div>
        </div>
        <div class="filter-row">
          <label></label>
          <label class="fav-filter-row"><input type="checkbox" id="body-search" onchange="applyFilters()"> <span data-i18n="bodysearch">📄 本文も検索</span></label>
        </div>
        <div class="filter-row">
          <label>From</label>
          <input type="date" id="date-from" onchange="applyFilters()" style="flex:1">
          <label style="margin-left:.25rem">To</label>
          <input type="date" id="date-to" onchange="applyFilters()" style="flex:1">
        </div>
        <div class="filter-row">
          <label data-i18n="min">最小件数</label>
          <input type="number" id="min-count" value="3" min="0" onchange="applyFilters()" style="width:55px">
        </div>
        <div class="filter-row">
          <label class="fav-filter-row"><input type="checkbox" id="fav-only" onchange="toggleFavFilter()"> <span data-i18n="favonly">☆ お気に入りのみ表示</span></label>
        </div>
        <div class="font-size-ctrl">
          <label data-i18n="fontsize">文字サイズ</label>
          <button class="fs-btn" data-size="small" onclick="setFontSize('small', this)">小</button>
          <button class="fs-btn active" data-size="medium" onclick="setFontSize('medium', this)">中</button>
          <button class="fs-btn" data-size="large" onclick="setFontSize('large', this)">大</button>
        </div>
      </div>
    </div>
    <div class="quick-access" id="quick-access" style="display:none"></div>
    <div class="conv-count" id="conv-count"></div>
    <div class="conv-list" id="conv-list">
      <div class="empty-state">
        <span class="icon">💬</span>
        <span class="hint">読み込み中...</span>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="conv-header" id="conv-header" style="display:none">
      <div class="conv-header-info">
        <div class="conv-header-title" id="conv-header-title"></div>
        <div class="conv-header-meta" id="conv-header-meta"></div>
      </div>
      <button class="toggle-btn" onclick="copyConvId()" title="この会話のIDをコピー（澪に渡せます）">📋 ID</button>
      <button class="toggle-btn" id="share-btn" onclick="shareConv()" title="24時間有効な共有リンクを生成" data-i18n="btn.share">🔗 共有</button>
      <button class="toggle-btn" id="thinking-toggle" onclick="toggleThinking()" data-i18n="thinking.show">🧠 思考を表示</button>
    </div>
    <div class="summary-panel" id="summary-panel" style="display:none">
      <div class="summary-head" onclick="toggleSummary()">
        <span class="summary-caret" id="summary-caret">▶</span>
        <span data-i18n="summary.title">📝 2層要約</span>
        <span class="summary-tag" id="summary-tag"></span>
      </div>
      <div class="summary-body" id="summary-body" style="display:none"></div>
    </div>
    <div class="messages-wrap" id="messages-wrap">
      <div class="empty-state">
        <span class="icon">💬</span>
        <span class="hint" data-i18n="empty.select">左のリストから会話を選択してください</span>
      </div>
    </div>
    <div class="msg-scroll-btns" id="msg-scroll-btns">
      <button class="msg-scroll-btn" onclick="msgScroll('top')" title="先頭へ">↑</button>
      <button class="msg-scroll-btn" onclick="msgScroll('bottom')" title="末尾へ">↓</button>
      <button class="msg-scroll-btn close" onclick="closeConv()" title="この会話を閉じる">✕</button>
    </div>
    <div class="related-panel" id="related-panel" style="display:none">
      <div class="related-header" data-i18n="related.title">関連記憶</div>
      <div id="related-items"></div>
      <div class="related-header" id="conv-files-header" style="display:none">このセッションで保存したファイル</div>
      <div id="conv-files-items"></div>
    </div>
  </div>

  <!-- Right slider panel -->
  <div class="right-panel" id="right-panel">
    <div class="right-panel-toggle" onclick="toggleRightPanel()" id="rp-toggle" title="パネルを開く">▶</div>
    <div class="right-panel-tabs" id="rp-tabs" style="display:none">
      <div class="rp-tab active" onclick="switchRpTab('inbox', this)" data-i18n="rp.inbox">受信</div>
      <div class="rp-tab" onclick="switchRpTab('coremem', this)">CoreMem</div>
      <div class="rp-tab" onclick="switchRpTab('memory', this)" data-i18n="rp.memory">記憶</div>
    </div>
    <div class="rp-content" id="rp-content" style="display:none">
      <div id="rp-inbox"><div class="rp-loading">読み込み中...</div></div>
      <div id="rp-coremem" style="display:none"></div>
      <div id="rp-memory" style="display:none"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const API = window.location.origin;
let filteredConvs = [];
let activeUuid = null;
let showThinking = false;
let activeAnnotations = [];   // U11: 現在表示中の会話の注記一覧
const convCache = new Map(); // uuid → full conversation data

// ── Auth ─────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('mio_token') || ''; }

function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  localStorage.setItem('mio_token', t);
  document.getElementById('auth-overlay').style.display = 'none';
  loadConversations();
}

function resetToken() {
  localStorage.removeItem('mio_token');
  document.getElementById('token-input').value = '';
  document.getElementById('auth-overlay').style.display = 'flex';
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveToken();
});

async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + getToken(), ...(options.headers || {}) }
  });
  if (res.status === 401) { document.getElementById('auth-overlay').style.display = 'flex'; throw new Error('401'); }
  return res;
}

// ── Server load ───────────────────────────────────────────────────────
let _filterTimer = null;

async function loadConversations() {
  const kw         = document.getElementById('keyword-input').value.trim();
  const dateFrom   = document.getElementById('date-from').value;
  const dateTo     = document.getElementById('date-to').value;
  const minCount   = parseInt(document.getElementById('min-count').value) || 0;
  const sort       = document.getElementById('sort-select').value;
  const bodySearch = document.getElementById('body-search').checked;

  document.getElementById('load-status').textContent = bodySearch && kw ? '本文検索中（少し時間がかかります）...' : '読み込み中...';
  document.getElementById('conv-list').innerHTML =
    '<div class="empty-state"><span class="icon">💬</span><span class="hint">読み込み中...</span></div>';

  let path = '/api/conversations/?limit=1000';
  if (kw)                   path += '&q='           + encodeURIComponent(kw);
  if (dateFrom)             path += '&from='        + encodeURIComponent(dateFrom);
  if (bodySearch && kw)     path += '&body_search=true';
  if (dateTo)   path += '&to='   + encodeURIComponent(dateTo);

  try {
    const res = await apiFetch(path);
    let convs = await res.json();

    // client-side: min-count + sort
    if (minCount > 0) convs = convs.filter(c => (c.message_count || 0) >= minCount);

    const [field, dir] = sort.split('_');
    const key = field === 'updated' ? 'updated_at' : 'created_at';
    convs.sort((a, b) => {
      const va = a[key] || '', vb = b[key] || '';
      return dir === 'desc' ? vb.localeCompare(va) : va.localeCompare(vb);
    });

    filteredConvs = convs;
    document.getElementById('load-status').textContent = '';
    renderList();
  } catch(e) {
    if (e.message !== '401') {
      document.getElementById('load-status').textContent = '取得失敗';
      document.getElementById('conv-list').innerHTML =
        '<div class="empty-state"><span class="icon">⚠️</span><span class="hint">取得失敗</span></div>';
    }
  }
}

function applyFilters() {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(loadConversations, 300);
}

// L1-c: 検索入力のクリア✕（入力があるときだけ表示）
function onKeywordInput() {
  const v = document.getElementById('keyword-input').value;
  document.getElementById('kw-clear').style.display = v ? 'block' : 'none';
  applyFilters();
}
function clearKeyword() {
  const inp = document.getElementById('keyword-input');
  inp.value = '';
  document.getElementById('kw-clear').style.display = 'none';
  inp.focus();
  applyFilters();
}

function renderList() {
  const list  = document.getElementById('conv-list');
  const count = document.getElementById('conv-count');
  renderQuickAccess();

  const favs = loadFavs();
  let items = filteredConvs;
  if (showFavOnly) items = items.filter(c => favs[c.uuid]);

  count.textContent = items.length ? `${items.length} 件${showFavOnly ? '（☆）' : ''}` : '';

  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><span class="icon">${showFavOnly ? '☆' : '📭'}</span><span class="hint">${showFavOnly ? t('fav.none') : (_lang === 'en' ? 'No matches' : '該当なし')}</span></div>`;
    return;
  }

  list.innerHTML = items.map(c => {
    const msgCount = c.message_count || 0;
    const date = (c.updated_at || c.created_at || '').slice(0, 10);
    const isActive = c.uuid === activeUuid;
    const on = !!favs[c.uuid];
    return `
      <div class="conv-item${isActive ? ' active' : ''}" onclick="selectConv('${esc(c.uuid)}')">
        <div class="conv-title-row">
          <button class="fav-star${on ? ' on' : ''}" title="お気に入り" onclick="toggleFav('${esc(c.uuid)}', event)">${on ? '★' : '☆'}</button>
          <span class="conv-title">${esc(c.title || c.name || '（無題）')}</span>
        </div>
        <div class="conv-meta"><span>${date}</span><span>${msgCount}件</span></div>
      </div>`;
  }).join('');
}

// ── L1: お気に入り（☆）＋最近開いた会話（localStorage 永続） ───────────
const FAV_KEY = 'mio_logs_favorites';   // { uuid: { title, ts } }
const RECENT_KEY = 'mio_logs_recent';   // [ { uuid, title, ts } ] newest first
let showFavOnly = false;

function loadFavs()   { try { return JSON.parse(localStorage.getItem(FAV_KEY))   || {}; } catch { return {}; } }
function loadRecent() { try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch { return []; } }

function favTitleFor(uuid) {
  const c = filteredConvs.find(x => x.uuid === uuid);
  if (c) return c.title || c.name || '';
  const cc = convCache.get(uuid);
  return cc ? (cc.name || '') : '';
}

function toggleFav(uuid, ev) {
  if (ev) ev.stopPropagation();
  const f = loadFavs();
  if (f[uuid]) delete f[uuid];
  else f[uuid] = { title: favTitleFor(uuid), ts: Date.now() };
  localStorage.setItem(FAV_KEY, JSON.stringify(f));
  renderList();
}

function toggleFavFilter() {
  showFavOnly = document.getElementById('fav-only').checked;
  renderList();
}

function recordRecent(uuid, title) {
  let r = loadRecent().filter(x => x.uuid !== uuid);
  r.unshift({ uuid, title: title || '', ts: Date.now() });
  r = r.slice(0, 8);
  localStorage.setItem(RECENT_KEY, JSON.stringify(r));
}

function renderQuickAccess() {
  const box = document.getElementById('quick-access');
  if (!box) return;
  const recent = loadRecent().slice(0, 5);
  if (showFavOnly || !recent.length) { box.style.display = 'none'; box.innerHTML = ''; return; }
  box.style.display = '';
  box.innerHTML =
    `<div class="qa-header"><span>${t('recent.title')}</span><span style="cursor:pointer" title="履歴をクリア" onclick="clearRecent()">×</span></div>` +
    recent.map(x =>
      `<div class="qa-item" onclick="selectConv('${esc(x.uuid)}')" title="${esc(x.title)}">
         <span class="qa-mark">›</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(x.title || '（無題）')}</span>
       </div>`).join('');
}

function clearRecent() {
  localStorage.removeItem(RECENT_KEY);
  renderQuickAccess();
}

function closeConv() {
  activeUuid = null;
  document.getElementById('conv-header').style.display = 'none';
  document.getElementById('summary-panel').style.display = 'none';
  document.getElementById('messages-wrap').innerHTML =
    `<div class="empty-state"><span class="icon">💬</span><span class="hint">${t('empty.select')}</span></div>`;
  document.getElementById('msg-scroll-btns').classList.remove('visible');
  const rp = document.getElementById('related-panel');
  if (rp) rp.style.display = 'none';
  renderList();
}

// ── L1-b: 2層要約パネル ───────────────────────────────────────────────
const SUMMARY_MARKER = '## 2層: 要約';
let _summaryOpen = false;

function extractSummary(body) {
  if (!body) return '';
  const i = body.indexOf(SUMMARY_MARKER);
  if (i === -1) return '';
  let seg = body.slice(i + SUMMARY_MARKER.length);
  const j = seg.indexOf('\n## ');
  if (j !== -1) seg = seg.slice(0, j);
  return seg.trim();
}

function setSummaryOpen(open) {
  _summaryOpen = open;
  document.getElementById('summary-body').style.display = open ? 'block' : 'none';
  document.getElementById('summary-caret').classList.toggle('open', open);
}

function toggleSummary() { setSummaryOpen(!_summaryOpen); }

async function loadSummaryPanel(conv) {
  const panel = document.getElementById('summary-panel');
  const bodyEl = document.getElementById('summary-body');
  const tagEl  = document.getElementById('summary-tag');
  panel.style.display = 'block';
  bodyEl.className = 'summary-body';
  bodyEl.innerHTML = `<span style="color:#484f58">${t('summary.loading')}</span>`;
  tagEl.textContent = '';
  setSummaryOpen(false);

  let summary = '';
  try {
    const q = (conv.name || '').slice(0, 40).trim();
    if (getToken() && conv.uuid && q) {
      // /api/memory/search は body 込みの全エントリを返す → source_thread 一致を探す
      const res = await apiFetch('/api/memory/search?q=' + encodeURIComponent(q));
      if (res.ok) {
        const hits = await res.json();
        const hit = (hits || []).find(h => h.source_thread === conv.uuid);
        if (hit) summary = extractSummary(hit.body || '');
      }
    }
  } catch {}

  if (summary) {
    bodyEl.className = 'summary-body md';
    bodyEl.innerHTML = renderMd(summary);
    tagEl.textContent = '';
    setSummaryOpen(true);   // 要約あり → 展開
  } else {
    bodyEl.className = 'summary-body';
    bodyEl.innerHTML = `<span style="color:#484f58">${t('summary.notgen')}</span>`;
    tagEl.textContent = t('summary.none');
    setSummaryOpen(false);  // 要約なし → 折りたたみ
  }
}

// ── Conversation viewer ───────────────────────────────────────────────
async function selectConv(uuid) {
  activeUuid = uuid;
  renderList();

  // Use cached full data or fetch from server
  let conv = convCache.get(uuid);
  if (!conv) {
    try {
      const res = await apiFetch('/api/conversations/' + encodeURIComponent(uuid));
      conv = await res.json();
      convCache.set(uuid, conv);
    } catch(e) {
      if (e.message !== '401') {
        document.getElementById('messages-wrap').innerHTML =
          '<div class="empty-state"><span class="icon">⚠️</span><span class="hint">取得失敗</span></div>';
      }
      return;
    }
  }

  document.getElementById('conv-header').style.display = 'flex';
  document.getElementById('conv-header-title').textContent = conv.name || '（無題）';
  const updated = (conv.updated_at || '').slice(0, 16).replace('T', ' ');
  const created = (conv.created_at || '').slice(0, 16).replace('T', ' ');
  document.getElementById('conv-header-meta').textContent = `作成: ${created}　更新: ${updated}`;

  recordRecent(uuid, conv.name || '');  // L1: 最近開いた会話に記録
  loadSummaryPanel(conv);               // L1-b: 2層要約パネル
  // U11: 注記を取得（生ログとは別レイヤー・失敗しても本文表示は続行）
  activeAnnotations = [];
  try {
    const ar = await apiFetch('/api/conversations/' + encodeURIComponent(uuid) + '/annotations');
    activeAnnotations = await ar.json();
  } catch(e) { activeAnnotations = []; }
  renderMessages(conv);
  document.getElementById('messages-wrap').scrollTop = 0;
  document.getElementById('msg-scroll-btns').classList.add('visible');
  loadRelated(conv);
  loadConvFiles(uuid);
}

function copyConvId() {
  if (!activeUuid) return;
  navigator.clipboard.writeText(activeUuid)
    .then(() => showToast('会話IDをコピーしました'))
    .catch(() => showToast('コピー失敗'));
}

// ── 会話共有（share.html への24hリンク生成）─────────────────────────
async function shareConv() {
  if (!activeUuid) return;
  try {
    const res = await apiFetch('/api/conversations/share/' + encodeURIComponent(activeUuid), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    if (!res.ok) {
      const body = await res.text().catch(() => '');
      console.error('shareConv failed:', res.status, body);
      showToast(`共有リンク生成失敗 (HTTP ${res.status})`);
      return;
    }
    const data = await res.json();
    showSharePopup(data.url, data.expires_at);
  } catch(e) {
    if (e.message !== '401') { console.error('shareConv error:', e); showToast('通信エラー'); }
  }
}

function showSharePopup(url, expiresAt) {
  closeSharePopup();
  const exp = (expiresAt || '').slice(0, 16).replace('T', ' ');
  const div = document.createElement('div');
  div.id = 'share-popup';
  div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center';
  div.innerHTML = `
    <div style="background:#161b22;border:1px solid #30363d;border-radius:10px;padding:1.3rem 1.5rem;max-width:520px;width:90%" onclick="event.stopPropagation()">
      <div style="font-size:.9rem;color:#e6edf3;margin-bottom:.8rem">🔗 共有リンクを作成しました</div>
      <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.7rem">
        <input id="share-url-input" type="text" readonly value="${esc(url)}"
          style="flex:1;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;padding:.45rem .6rem;font-size:.78rem">
        <button class="toggle-btn" onclick="copyShareUrl()">📋 コピー</button>
      </div>
      <div style="font-size:.74rem;color:#8b949e;margin-bottom:1rem">⏰ 有効期限: ${esc(exp)}（24時間）・閲覧は読み取り専用</div>
      <div style="text-align:right"><button class="toggle-btn" onclick="closeSharePopup()">閉じる</button></div>
    </div>`;
  div.addEventListener('click', closeSharePopup);
  document.body.appendChild(div);
}

function copyShareUrl() {
  const input = document.getElementById('share-url-input');
  if (!input) return;
  navigator.clipboard.writeText(input.value)
    .then(() => showToast('共有URLをコピーしました'))
    .catch(() => { input.select(); document.execCommand('copy'); showToast('共有URLをコピーしました'); });
}

function closeSharePopup() {
  const p = document.getElementById('share-popup');
  if (p) p.remove();
}

function msgScroll(dir) {
  const wrap = document.getElementById('messages-wrap');
  wrap.scrollTo({ top: dir === 'top' ? 0 : wrap.scrollHeight, behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleThinking() {
  showThinking = !showThinking;
  const btn = document.getElementById('thinking-toggle');
  btn.classList.toggle('active', showThinking);
  btn.textContent = showThinking ? t('thinking.hide') : t('thinking.show');
  if (activeUuid) {
    const conv = convCache.get(activeUuid);
    if (conv) renderMessages(conv);
  }
}

// U11: 注記 target（通番 / "No.X" / null）→ メッセージ通番 or null（会話全体）
function annTargetNo(target) {
  if (target === null || target === undefined || target === '') return null;
  const m = String(target).match(/(\d+)/);
  return m ? parseInt(m[1], 10) : null;
}

// U11: 注記リストを HTML 化（番号・著者・日付・本文）
function renderAnnotations(anns) {
  return anns.map(a => {
    const date = (a.created_at || '').slice(0, 10);
    return `<div class="ann-item">
        <div class="ann-meta">📝 <b>#${esc(String(a.seq ?? '?'))}</b> by ${esc(a.author || '?')} <span class="ann-date">${esc(date)}</span></div>
        <div class="ann-note md">${renderMd(a.note || '')}</div>
      </div>`;
  }).join('');
}

function renderMessages(conv) {
  const wrap = document.getElementById('messages-wrap');
  const msgs = conv.chat_messages || [];

  if (!msgs.length) {
    wrap.innerHTML = '<div class="empty-state"><span class="icon">📭</span><span class="hint">メッセージなし</span></div>';
    return;
  }

  // U11: 注記を通番ごとに整理（番号付けは chat_messages の1始まり = サーバ conversation_read と一致）
  const annByNo = {}, annGlobal = [];
  (activeAnnotations || []).forEach(a => {
    const no = annTargetNo(a.target);
    if (no === null) annGlobal.push(a);
    else (annByNo[no] = annByNo[no] || []).push(a);
  });

  let html = '';
  // 会話全体への注記はビューア先頭にまとめて表示
  if (annGlobal.length) {
    html += `<div class="ann-global">${mkCollapsible('ann-global', '📝 会話全体への注記 (' + annGlobal.length + ')', renderAnnotations(annGlobal), false)}</div>`;
  }

  html += msgs.map((msg, mi) => {
    const role   = msg.sender === 'human' ? 'human' : 'assistant';
    const ts     = (msg.created_at || '').slice(11, 16);
    const blocks = renderContentBlocks(msg.content || [], role, mi);
    const no     = mi + 1;
    const anns   = annByNo[no];
    // 本文が空の assistant でも、注記があれば残す（対象注記を取りこぼさない）
    if (!blocks.trim() && role === 'assistant' && !anns) return '';
    const annBlock = anns
      ? `<div class="msg-ann">${mkCollapsible('ann' + mi, '📝 注記 (' + anns.length + ')', renderAnnotations(anns), false)}</div>`
      : '';
    return `
      <div class="msg msg-${role}">
        <div class="msg-role">
          <span>${role === 'human' ? '👤 Human' : '🤖 Assistant'}</span>
          <span class="msg-ts">${esc(ts)}</span>
        </div>
        ${blocks}
        ${annBlock}
      </div>`;
  }).join('');

  wrap.innerHTML = html;
}

function renderMd(text) {
  return DOMPurify.sanitize(marked.parse(text || ''));
}

// R1: モーダル本文を共通レンダラーでMD表示
function setModalBody(text) {
  const el = document.getElementById('modal-body');
  el.className = 'modal-body md';
  el.innerHTML = renderMd(text);
}

function renderContentBlocks(content, role, mi) {
  if (typeof content === 'string') {
    return `<div class="block-text">${renderMd(content)}</div>`;
  }
  return (content || []).map((block, bi) => {
    const id = `b${mi}_${bi}`;
    if (block.type === 'text') {
      return `<div class="block-text">${renderMd(block.text || '')}</div>`;
    }
    if (block.type === 'thinking') {
      if (!showThinking) return '';
      return mkCollapsible(id, '🧠 思考', escHtml(block.thinking || ''), false);
    }
    if (block.type === 'tool_use') {
      const inp = block.input ? decodeUniEsc(JSON.stringify(block.input, null, 2)) : '';
      return mkCollapsible(id, `⚙ ${escHtml(block.name || 'tool_use')}`, `<span class="tool-input">${escHtml(inp)}</span>`, false);
    }
    if (block.type === 'tool_result') {
      const inner = block.content;
      let text = '';
      if (typeof inner === 'string') text = inner;
      else if (Array.isArray(inner)) text = inner.map(b => b.text || '').join('\n');
      // JSON-in-JSON の二重エスケープをデコード（tool_search 等の返り値対策）
      if (text.startsWith('{') || text.startsWith('[')) {
        try { text = JSON.stringify(JSON.parse(text), null, 2); } catch(e) {}
      }
      // JSONパースできなかった場合や入れ子文字列内に残る \uXXXX を表示用にデコード
      text = decodeUniEsc(text);
      return mkCollapsible(id, '📤 tool_result', escHtml(text), false);
    }
    return '';
  }).join('');
}

function mkCollapsible(id, label, innerHtml, openByDefault) {
  const cls = openByDefault ? ' open' : '';
  return `
    <div class="block-collapsible">
      <div class="block-header${cls}" onclick="toggleBlock('${id}', this)">
        ${label}<span class="chevron">▶</span>
      </div>
      <div class="block-content${cls}" id="${id}">${innerHtml}</div>
    </div>`;
}

function toggleBlock(id, header) {
  const content = document.getElementById(id);
  const isOpen = content.classList.toggle('open');
  header.classList.toggle('open', isOpen);
}

// ── Related memory ────────────────────────────────────────────────────
async function loadRelated(conv) {
  const panel = document.getElementById('related-panel');
  const items = document.getElementById('related-items');
  panel.style.display = 'block';
  items.innerHTML = '<div class="related-empty">検索中...</div>';

  if (!getToken()) {
    items.innerHTML = '<div class="related-empty">関連記憶の検索にはトークンが必要です</div>';
    return;
  }

  try {
    let results = [];
    const uuid = conv.uuid || '';

    // 1. Search by source_thread
    if (uuid) {
      const res = await apiFetch('/api/memory/index');
      if (res.ok) {
        const index = await res.json();
        results = index.filter(e => e.source_thread === uuid && !e.deleted).slice(0, 5);
      }
    }

    // 2. Fallback: keyword search from title
    if (!results.length && conv.name) {
      const words = conv.name.split(/[\s　、。・「」【】]+/).filter(w => w.length >= 2).slice(0, 3);
      for (const word of words) {
        if (results.length >= 5) break;
        try {
          const res2 = await apiFetch('/api/memory/search?q=' + encodeURIComponent(word));
          if (res2.ok) {
            const hits = await res2.json();
            for (const h of hits) {
              if (results.length >= 5) break;
              if (!results.find(r => r.id === h.id)) results.push(h);
            }
          }
        } catch {}
      }
    }

    if (!results.length) {
      items.innerHTML = '<div class="related-empty">関連記憶なし</div>';
      return;
    }

    items.innerHTML = results.slice(0, 5).map(e => {
      const badge = e.source_thread === uuid ? 'スレッド一致' : 'キーワード';
      return `
        <div class="related-item" onclick="openRelated('${esc(e.id)}')">
          <span class="related-title">${esc(e.title || e.id)}</span>
          <span class="related-badge">${badge}</span>
        </div>`;
    }).join('');

  } catch(e) {
    if (e.message !== '401') {
      items.innerHTML = '<div class="related-empty">取得失敗</div>';
    }
  }
}

// ── このセッションで保存したファイル（U4: チャット→ファイル）──────────
let _convFiles = [];

async function loadConvFiles(uuid) {
  const header = document.getElementById('conv-files-header');
  const items  = document.getElementById('conv-files-items');
  header.style.display = 'none';
  items.innerHTML = '';
  _convFiles = [];
  if (!getToken() || !uuid) return;

  // CoreMem（source_conversation_uuid 一致）
  try {
    const res = await apiFetch('/api/coremem');
    const cm  = await res.json();
    (Array.isArray(cm) ? cm : []).filter(a => a.source_conversation_uuid === uuid)
      .forEach(a => _convFiles.push({ label: a.name, type: 'coremem', name: a.name }));
  } catch {}

  // 会話内アーティファクト（conv_uuid 一致）
  try {
    const res = await apiFetch('/api/conv-artifacts');
    const fa  = await res.json();
    (Array.isArray(fa) ? fa : []).filter(f => f.conv_uuid === uuid)
      .forEach(f => _convFiles.push({ label: f.filename, type: 'conv', name: f.filename, conv: f.conv_uuid }));
  } catch {}

  if (!_convFiles.length) return;
  header.style.display = '';
  items.innerHTML = _convFiles.map((f, i) => `
    <div class="related-item" onclick="openConvFile(${i})">
      <span class="related-title">📄 ${esc(f.label)}</span>
      <span class="related-badge">${f.type === 'coremem' ? 'CoreMem' : '抽出'}</span>
    </div>`).join('');
}

async function openConvFile(i) {
  const f = _convFiles[i];
  if (!f) return;
  const path = f.type === 'coremem'
    ? '/api/coremem/' + encodeURIComponent(f.name)
    : `/api/conv-artifacts/${encodeURIComponent(f.conv)}/${encodeURIComponent(f.name)}`;
  try {
    const res  = await apiFetch(path);
    const data = await res.json();
    document.getElementById('modal-title').textContent = f.name;
    document.getElementById('modal-meta').textContent  = f.type === 'coremem' ? 'CoreMem' : '会話内アーティファクト';
    setModalBody(data.content || '');
    openModal();
  } catch {}
}

async function openRelated(id) {
  try {
    const res = await apiFetch('/api/memory/' + encodeURIComponent(id));
    const e = await res.json();
    const date = (e.created_at || '').slice(0, 16).replace('T', ' ');
    document.getElementById('modal-title').textContent = e.title || '';
    document.getElementById('modal-meta').textContent =
      `${date}　${(e.tags || []).join(' · ')}　importance: ${e.importance || 'normal'}`;
    setModalBody(e.body || '');
    openModal();
  } catch {}
}

// ── Modal ─────────────────────────────────────────────────────────────
function openModal()  {
  document.getElementById('modal').classList.add('open');
  document.getElementById('modal-box').scrollTop = 0;
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Util ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// \uXXXX エスケープ（サロゲートペア含む）を表示用に実文字へデコードする
function decodeUniEsc(s) {
  return String(s).replace(/\\u([0-9a-fA-F]{4})/g, (m, h) => String.fromCharCode(parseInt(h, 16)));
}

(async function() {
  // Handle ?token= (shared conversation link — no login required)
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  if (token) {
    document.getElementById('auth-overlay').style.display = 'none';
    document.getElementById('share-btn').style.display = 'none';  // 共有閲覧モードでは再共有不可
    document.getElementById('load-status').textContent = '共有リンクから読み込み中...';
    try {
      const res = await fetch(API + '/api/conversations/view?token=' + encodeURIComponent(token));
      if (res.status === 410) {
        document.getElementById('load-status').textContent = 'リンクの有効期限が切れています';
        return;
      }
      if (!res.ok) {
        document.getElementById('load-status').textContent = 'リンクが無効です';
        return;
      }
      const conv = await res.json();
      convCache.set(conv.uuid || '', conv);
      filteredConvs = [{
        uuid: conv.uuid || '', title: conv.name || '',
        created_at: conv.created_at || '', updated_at: conv.updated_at || '',
        message_count: (conv.chat_messages || []).length
      }];
      document.getElementById('load-status').textContent = '';
      renderList();
      selectConv(conv.uuid || '');
    } catch {
      document.getElementById('load-status').textContent = '読み込みエラー';
    }
    return;
  }

  // Normal: auto-load if token exists
  if (getToken()) {
    document.getElementById('auth-overlay').style.display = 'none';
    await loadConversations();
    // ?conv=<uuid> ディープリンク（admin.html のファイル→会話ジャンプで使用）
    const convParam = params.get('conv');
    if (convParam) selectConv(convParam);
  }
})();

// ── Right panel ───────────────────────────────────────────────────────
let rpOpen = false;
let rpTab = 'inbox';

function toggleRightPanel() {
  rpOpen = !rpOpen;
  const panel = document.getElementById('right-panel');
  const toggle = document.getElementById('rp-toggle');
  const tabs   = document.getElementById('rp-tabs');
  const content = document.getElementById('rp-content');
  panel.classList.toggle('open', rpOpen);
  toggle.textContent = rpOpen ? '◀' : '▶';
  toggle.title = rpOpen ? 'パネルを閉じる' : 'パネルを開く';
  tabs.style.display   = rpOpen ? 'flex' : 'none';
  content.style.display = rpOpen ? 'block' : 'none';
  if (rpOpen) loadRpTab(rpTab);
}

function switchRpTab(tab, el) {
  rpTab = tab;
  document.querySelectorAll('.rp-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  ['inbox','coremem','memory'].forEach(t => {
    document.getElementById('rp-' + t).style.display = (t === tab) ? 'block' : 'none';
  });
  loadRpTab(tab);
}

async function loadRpTab(tab) {
  const el = document.getElementById('rp-' + tab);
  el.innerHTML = '<div class="rp-loading">読み込み中...</div>';
  try {
    if (tab === 'inbox') {
      const res  = await fetch(`${API}/api/inbox?to=chat&full=true`, { headers: { 'Authorization': 'Bearer ' + getToken() }});
      const data = await res.json();
      const items = Array.isArray(data) ? data : (data.data || []);
      if (!items.length) { el.innerHTML = '<div class="rp-empty">メッセージなし</div>'; return; }
      el.innerHTML = items.slice(0, 20).map(m => {
        const date = (m.created_at || '').slice(0, 16).replace('T', ' ');
        const read = m.read ? '' : '● ';
        return `<div class="rp-item"><div class="rp-item-title">${read}${esc(m.title || '(無題)')}</div><div class="rp-item-meta">${date}${m.persistent ? ' 📌' : ''}</div></div>`;
      }).join('');
    } else if (tab === 'coremem') {
      const res  = await fetch(`${API}/api/coremem`, { headers: { 'Authorization': 'Bearer ' + getToken() }});
      const items = await res.json();
      if (!items.length) { el.innerHTML = '<div class="rp-empty">なし</div>'; return; }
      el.innerHTML = items.map(a => {
        const date = (a.updated_at || '').slice(0, 10);
        const ver  = a.version != null ? `v${String(a.version).padStart(3,'0')}` : '';
        return `<div class="rp-item"><div class="rp-item-title">${esc(a.name)}</div><div class="rp-item-meta">${ver} ${date}</div></div>`;
      }).join('');
    } else if (tab === 'memory') {
      const res  = await fetch(`${API}/api/memory/index`, { headers: { 'Authorization': 'Bearer ' + getToken() }});
      const data = await res.json();
      const items = (Array.isArray(data) ? data : []).slice(0, 15);
      if (!items.length) { el.innerHTML = '<div class="rp-empty">なし</div>'; return; }
      el.innerHTML = items.map(m => {
        const date = (m.updated_at || m.created_at || '').slice(0, 10);
        return `<div class="rp-item"><div class="rp-item-title">${esc(m.title || '(無題)')}</div><div class="rp-item-meta">${(m.tags || []).join(' ') || ''} ${date}</div></div>`;
      }).join('');
    }
  } catch { el.innerHTML = '<div class="rp-empty">取得失敗</div>'; }
}
