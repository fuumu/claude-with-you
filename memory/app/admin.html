<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>澪の記憶サーバー — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-jsx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', sans-serif; background: #1a1a2e; color: #c8d8e8; height: 100vh; overflow: hidden; }

    /* ── Auth ── */
    .auth-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 200; display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 12px;
      padding: 2rem 2.5rem; width: 340px;
    }
    .auth-card h2 { font-size: 1.1rem; color: #7c6af7; margin-bottom: .4rem; }
    .auth-card p  { font-size: .85rem; color: #7a8a9a; margin-bottom: 1.5rem; }
    .auth-card input {
      width: 100%; padding: .55rem .75rem; background: #0f0f1a;
      border: 1px solid #2a3a5a; border-radius: 6px;
      color: #c8d8e8; font-size: .95rem; margin-bottom: 1rem;
    }
    .auth-card input:focus { outline: none; border-color: #7c6af7; }

    /* ── Header ── */
    header {
      background: #0f0f1a; border-bottom: 1px solid #2a3a5a;
      padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1rem; color: #7c6af7; }
    #token-status { font-size: .8rem; color: #5a6a7a; cursor: pointer; }
    #token-status:hover { color: #7c6af7; }

    /* ── Tabs ── */
    .tabs { display: flex; border-bottom: 1px solid #2a3a5a; background: #0f0f1a; padding: 0 1.5rem; }
    .tab-btn {
      padding: .75rem 1.25rem; background: none; border: none;
      color: #7a8a9a; cursor: pointer; font-size: .9rem;
      border-bottom: 2px solid transparent; transition: color .2s;
    }
    .tab-btn.active { color: #7c6af7; border-bottom-color: #7c6af7; }
    .tab-btn:hover  { color: #c8d8e8; }
    .tab-panel      { display: none; padding: 1.5rem; }
    .tab-panel.active { display: block; height: calc(100vh - 88px); overflow-y: auto; }

    /* ── Search ── */
    .search-bar { margin-bottom: .75rem; }
    .search-bar input {
      width: 100%; max-width: 400px; padding: .5rem .75rem;
      background: #0f0f1a; border: 1px solid #2a3a5a; border-radius: 6px;
      color: #c8d8e8; font-size: .85rem;
    }
    .search-bar input:focus { outline: none; border-color: #7c6af7; }
    .search-bar input::placeholder { color: #3a4a6a; }

    /* ── Filter ── */
    .filter-bar { display: flex; gap: .5rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn {
      padding: .3rem .8rem; border: 1px solid #2a3a5a; border-radius: 999px;
      background: none; color: #7a8a9a; cursor: pointer; font-size: .8rem; transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover { background: #7c6af7; border-color: #7c6af7; color: #fff; }

    /* ── Cards ── */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
    .card {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 8px;
      padding: 1rem; cursor: pointer; transition: border-color .2s, transform .1s;
    }
    .card:hover { border-color: #7c6af7; transform: translateY(-1px); }
    .card.deleted { opacity: .5; }
    .card-title  { font-size: .9rem; margin-bottom: .5rem; line-height: 1.4; }
    .card-meta   { font-size: .75rem; color: #5a6a7a; margin-bottom: .5rem; }
    .card-tags   { display: flex; gap: .3rem; flex-wrap: wrap; }
    .card-footer { display: flex; justify-content: flex-end; gap: .4rem; margin-top: .6rem; }
    .btn-delete  {
      padding: .2rem .6rem; font-size: .72rem; background: none;
      border: 1px solid rgba(231,76,60,.4); border-radius: 4px; color: #e74c3c; cursor: pointer;
    }
    .btn-delete:hover { background: rgba(231,76,60,.1); }
    .btn-link {
      padding: .2rem .6rem; font-size: .72rem; background: none;
      border: 1px solid rgba(52,152,219,.4); border-radius: 4px; color: #3498db; cursor: pointer;
    }
    .btn-link:hover { background: rgba(52,152,219,.1); }
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(1rem);
      background: #2ecc71; color: #fff; padding: .55rem 1.2rem; border-radius: 8px;
      font-size: .85rem; opacity: 0; transition: opacity .3s, transform .3s; pointer-events: none; z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .tag {
      padding: .15rem .5rem; border-radius: 4px; font-size: .7rem;
      background: #0f0f1a; border: 1px solid #2a3a5a; color: #7a8a9a;
    }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: .4rem; vertical-align: middle; }
    .dot-high   { background: #e74c3c; }
    .dot-normal { background: #7c6af7; }
    .dot-low    { background: #5a6a7a; }

    /* ── Artifacts ── */
    .artifact-list { display: flex; flex-direction: column; gap: .5rem; }
    .artifact-item {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 8px;
      padding: .75rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 1rem;
      transition: border-color .2s;
    }
    .artifact-item:hover { border-color: #7c6af7; }
    .artifact-name { font-size: .9rem; font-family: monospace; flex: 1; }
    .artifact-ver  { font-size: .75rem; color: #7c6af7; }
    .artifact-date { font-size: .75rem; color: #5a6a7a; }
    .del-btn { background: none; border: none; color: #5a6a7a; cursor: pointer; font-size: .85rem; padding: .1rem .3rem; border-radius: 4px; opacity: 0; transition: all .15s; }
    .artifact-item:hover .del-btn { opacity: 1; }
    .del-btn:hover { color: #e05c5c; background: #3a1a1a; }

    /* ── Batch command ── */
    .batch-section {
      max-width: 600px; margin: 1.75rem auto 0;
    }
    .batch-section h3 { font-size: .85rem; color: #7a8a9a; margin-bottom: .75rem; }
    .batch-section p  { font-size: .8rem; color: #5a6a7a; margin-bottom: .75rem; line-height: 1.6; }
    .batch-cmd-wrap {
      background: #0f0f1a; border: 1px solid #2a3a5a; border-radius: 8px;
      padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem;
    }
    .batch-cmd { font-family: monospace; font-size: .85rem; color: #c8d8e8; flex: 1; white-space: nowrap; overflow-x: auto; }
    .copy-btn {
      padding: .3rem .75rem; font-size: .78rem; background: none;
      border: 1px solid #2a3a5a; border-radius: 5px; color: #7a8a9a; cursor: pointer; white-space: nowrap;
    }
    .copy-btn:hover { border-color: #7c6af7; color: #7c6af7; }
    .copy-btn.copied { border-color: #2ecc71; color: #2ecc71; }

    /* ── Batch progress panel ── */
    .batch-progress-panel {
      max-width: 600px; margin: 1.25rem auto 0;
      padding: .85rem 1rem; background: #16213e; border: 1px solid #2a3a5a; border-radius: 8px;
    }
    .batch-progress-header { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: .45rem; color: #c8d8e8; }
    .batch-progress-bar-wrap { height: 6px; background: #0f0f1a; border-radius: 3px; overflow: hidden; margin-bottom: .45rem; }
    .batch-progress-bar { height: 100%; background: #7c6af7; width: 0%; transition: width .5s; }
    .batch-status-detail { font-size: .78rem; color: #5a6a7a; }

    /* ── Import status ── */
    .import-status {
      max-width: 600px; margin: 0 auto 1.25rem; padding: .65rem 1rem;
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 8px;
      font-size: .82rem; color: #7a8a9a; display: flex; align-items: center; gap: .5rem;
    }
    .import-status .label { color: #5a6a7a; }
    .import-status .value { color: #c8d8e8; font-family: monospace; }
    .import-status .date  { color: #5a6a7a; margin-left: auto; }

    /* ── Import ── */
    .drop-zone {
      border: 2px dashed #2a3a5a; border-radius: 12px; padding: 3rem;
      text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
      max-width: 600px; margin: 0 auto;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: #7c6af7; background: rgba(124,106,247,.05); }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: .75rem; }
    .drop-zone p    { color: #5a6a7a; margin-bottom: 1rem; }
    #import-result  { margin-top: 1.5rem; text-align: center; font-size: .9rem; }
    .result-ok  { color: #2ecc71; }
    .result-err { color: #e74c3c; }

    /* ── Buttons ── */
    .btn { padding: .5rem 1.2rem; background: #7c6af7; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-size: .9rem; }
    .btn:hover { background: #6a5ae0; }
    .btn-secondary { background: none; border: 1px solid #2a3a5a; color: #c8d8e8; }
    .btn-secondary:hover { border-color: #7c6af7; color: #7c6af7; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #2a3a5a; border-top-color: #7c6af7;
      border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle; margin-right: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 12px;
      width: 90%; max-width: 720px; max-height: 80vh; overflow-y: auto; padding: 1.5rem;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    .modal-title  { font-size: 1rem; line-height: 1.4; flex: 1; padding-right: 1rem; }
    .modal-close  { background: none; border: none; color: #5a6a7a; cursor: pointer; font-size: 1.2rem; }
    .modal-close:hover { color: #c8d8e8; }
    .modal-meta   { font-size: .8rem; color: #5a6a7a; margin-bottom: 1rem; }
    .modal-body   { font-size: .875rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }

    /* Markdown */
    .md-body h1, .md-body h2, .md-body h3 { margin: 1rem 0 .5rem; color: #7c6af7; }
    .md-body p   { margin-bottom: .75rem; }
    .md-body code { background: #0f0f1a; padding: .1rem .3rem; border-radius: 3px; font-size: .85em; }
    .md-body pre  { background: #0f0f1a; padding: .75rem; border-radius: 6px; overflow-x: auto; margin-bottom: .75rem; }
    .md-body pre code { background: none; padding: 0; }
    .md-body ul, .md-body ol { margin-left: 1.5rem; margin-bottom: .75rem; }
    .md-body table { border-collapse: collapse; width: 100%; margin-bottom: .75rem; }
    .md-body th, .md-body td { border: 1px solid #2a3a5a; padding: .4rem .75rem; font-size: .85em; }
    .md-body th   { background: #0f0f1a; }

    .empty { text-align: center; color: #5a6a7a; padding: 3rem; font-size: .9rem; }

    /* ── Files ── */
    .files-toolbar { display: flex; gap: .5rem; margin-bottom: .6rem; flex-wrap: wrap; align-items: center; }
    .files-search  { flex: 1; min-width: 200px; max-width: 360px; padding: .5rem .75rem;
                     background: #0f0f1a; border: 1px solid #2a3a5a; border-radius: 6px;
                     color: #c8d8e8; font-size: .85rem; }
    .files-search:focus { outline: none; border-color: #7c6af7; }
    .files-search::placeholder { color: #3a4a6a; }
    .files-count   { font-size: .8rem; color: #5a6a7a; margin-left: auto; }

    .files-ext-bar { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: .5rem; }
    .files-date-bar {
      display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem;
      font-size: .82rem; color: #7a8a9a;
    }
    .files-date-bar input[type="date"] {
      padding: .3rem .5rem; background: #0f0f1a; border: 1px solid #2a3a5a;
      border-radius: 4px; color: #c8d8e8; font-size: .78rem;
    }
    .files-header {
      display: grid; grid-template-columns: 14rem 1fr 6rem 4.5rem;
      gap: .75rem; padding: .35rem 1rem; margin-bottom: .35rem;
      font-size: .75rem; color: #5a6a7a; font-weight: 600;
      border-bottom: 1px solid #2a3a5a;
    }
    .files-col-hdr { cursor: pointer; user-select: none; }
    .files-col-hdr:hover { color: #7c6af7; }
    .files-col-right { text-align: right; }

    .files-list    { display: flex; flex-direction: column; gap: .35rem; }
    .files-row {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 7px;
      padding: .6rem 1rem; display: grid;
      grid-template-columns: 14rem 1fr 6rem 4.5rem;
      align-items: center; gap: .75rem; cursor: pointer; transition: border-color .2s;
      font-size: .82rem;
    }
    .files-row:hover { border-color: #7c6af7; }
    .files-name  { font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #c8d8e8; }
    .files-conv  { color: #7a8a9a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .files-date  { color: #5a6a7a; font-size: .78rem; }
    .files-size  { color: #5a6a7a; font-size: .78rem; text-align: right; }

    /* ── TOP button ── */
    .top-btn {
      position: fixed; bottom: 5rem; right: 1.5rem;
      width: 44px; height: 44px; border-radius: 50%;
      background: #7c6af7; border: none; color: #fff; font-size: .72rem;
      cursor: pointer; z-index: 50; opacity: 0; pointer-events: none;
      box-shadow: 0 2px 10px rgba(0,0,0,.5);
      transition: opacity .25s;
    }
    .top-btn.visible { opacity: 1; pointer-events: auto; }

    /* ── Oplog ── */
    .oplog-toolbar { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; }
    .oplog-count   { font-size: .8rem; color: #5a6a7a; margin-left: auto; }
    .oplog-list    { display: flex; flex-direction: column; gap: .35rem; }
    .oplog-row {
      background: #16213e; border: 1px solid #2a3a5a; border-radius: 7px;
      padding: .6rem 1rem; display: grid;
      grid-template-columns: 9rem 6rem 1fr;
      align-items: center; gap: .75rem; cursor: pointer; transition: border-color .2s;
      font-size: .82rem;
    }
    .oplog-row:hover { border-color: #7c6af7; }
    .oplog-ts   { color: #5a6a7a; font-family: monospace; font-size: .78rem; }
    .op-badge {
      display: inline-block; padding: .15rem .5rem; border-radius: 4px;
      font-size: .72rem; font-weight: 600; text-align: center; letter-spacing: .02em;
    }
    .op-create { background: rgba(46,204,113,.15); color: #2ecc71; border: 1px solid rgba(46,204,113,.3); }
    .op-update { background: rgba(52,152,219,.15); color: #3498db; border: 1px solid rgba(52,152,219,.3); }
    .op-upsert { background: rgba(124,106,247,.15); color: #7c6af7; border: 1px solid rgba(124,106,247,.3); }
    .op-delete { background: rgba(231,76,60,.15);  color: #e74c3c; border: 1px solid rgba(231,76,60,.3); }
    .op-import { background: rgba(241,196,15,.15); color: #f1c40f; border: 1px solid rgba(241,196,15,.3); }
    .oplog-id  { color: #c8d8e8; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Prism overrides ── */
    pre[class*="language-"] { border-radius: 6px; margin: 0; font-size: .82rem; }
    code[class*="language-"] { white-space: pre-wrap; word-break: break-word; }

    /* ── Inbox ── */
    .inbox-toolbar { display:flex; gap:.5rem; align-items:center; margin-bottom:1rem; flex-wrap:wrap; }
    .inbox-filter-btn { background:none; border:1px solid #2a3a5a; border-radius:4px; color:#7a8a9a; padding:.25rem .65rem; font-size:.8rem; cursor:pointer; }
    .inbox-filter-btn.active { border-color:#7ec8e3; color:#7ec8e3; }
    .inbox-list { display:flex; flex-direction:column; gap:.5rem; }
    .inbox-item { background:#1a1a2e; border:1px solid #2a3a5a; border-radius:8px; padding:.75rem 1rem; cursor:pointer; transition:border-color .15s; }
    .inbox-item:hover { border-color:#7ec8e3; }
    .inbox-item.unread { border-left:3px solid #7ec8e3; }
    .inbox-item.persistent { border-left:3px solid #f1c40f; }
    .inbox-item-header { display:flex; align-items:center; gap:.5rem; margin-bottom:.25rem; }
    .inbox-item-title { font-size:.9rem; color:#c8d8e8; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .inbox-badge-unread { background:#7ec8e3; color:#0f0f1a; border-radius:4px; font-size:.7rem; padding:1px 5px; flex-shrink:0; }
    .inbox-badge-persistent { background:#f1c40f; color:#0f0f1a; border-radius:4px; font-size:.7rem; padding:1px 5px; flex-shrink:0; }
    .inbox-item-meta { font-size:.75rem; color:#5a6a7a; }
    .inbox-detail { background:#1a1a2e; border:1px solid #2a3a5a; border-radius:8px; padding:1.25rem; margin-top:1rem; display:none; }
    .inbox-detail.open { display:block; }
    .inbox-detail-title { font-size:1rem; color:#c8d8e8; margin-bottom:.5rem; }
    .inbox-detail-meta { font-size:.78rem; color:#5a6a7a; margin-bottom:1rem; }
    .inbox-detail-body { font-size:.88rem; color:#b0c0d0; line-height:1.7; white-space:pre-wrap; word-break:break-word; }
    .inbox-empty { color:#5a6a7a; font-size:.88rem; text-align:center; padding:2rem 0; }
    .inbox-actions { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .inbox-action-btn { background:none; border:1px solid #2a3a5a; border-radius:4px; color:#7a8a9a; padding:.25rem .65rem; font-size:.78rem; cursor:pointer; transition:border-color .15s,color .15s; }
    .inbox-action-btn:hover { border-color:#7ec8e3; color:#7ec8e3; }
    .inbox-action-btn.danger:hover { border-color:#e74c3c; color:#e74c3c; }

    /* ── Friends ── */
    .friends-section { margin-bottom: 1.5rem; }
    .friends-section h3 { font-size:.88rem; color:#7ec8e3; margin-bottom:.75rem; border-bottom:1px solid #2a3a5a; padding-bottom:.4rem; }
    .friends-table { width:100%; border-collapse:collapse; font-size:.83rem; }
    .friends-table th { text-align:left; color:#5a6a7a; font-weight:400; padding:.4rem .6rem; border-bottom:1px solid #2a3a5a; }
    .friends-table td { padding:.5rem .6rem; border-bottom:1px solid #1a1a2e; color:#b0c0d0; vertical-align:middle; }
    .friends-table tr:hover td { background:#1a1a2e; }
    .friends-badge-status { border-radius:4px; font-size:.7rem; padding:1px 5px; }
    .friends-badge-pending  { background:#f39c12; color:#0f0f1a; }
    .friends-badge-active   { background:#2ecc71; color:#0f0f1a; }
    .friends-badge-revoked  { background:#5a6a7a; color:#c8d8e8; }
    .friends-btn { background:none; border:1px solid #2a3a5a; border-radius:4px; color:#7a8a9a; padding:.2rem .55rem; font-size:.75rem; cursor:pointer; transition:border-color .15s,color .15s; }
    .friends-btn:hover { border-color:#7ec8e3; color:#7ec8e3; }
    .friends-btn.danger:hover { border-color:#e74c3c; color:#e74c3c; }
    .friends-empty { color:#5a6a7a; font-size:.85rem; padding:.8rem 0; }
    .friends-toolbar { display:flex; gap:.5rem; margin-bottom:1rem; align-items:center; }
  </style>
</head>
<body>

<!-- Auth overlay -->
<div class="auth-overlay" id="auth-overlay">
  <div class="auth-card">
    <h2>澪の記憶サーバー</h2>
    <p>APIトークンを入力してください</p>
    <input type="password" id="token-input" placeholder="mio2026..." autocomplete="current-password">
    <button class="btn" style="width:100%" onclick="saveToken()">接続</button>
  </div>
</div>

<header>
  <h1>澪の記憶サーバー — Admin</h1>
  <span id="token-status" onclick="resetToken()">トークン変更</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('memory', this)">Memory</button>
  <button class="tab-btn" onclick="switchTab('coremem', this)">CoreMem</button>
  <button class="tab-btn" onclick="switchTab('import', this)">Import</button>
  <button class="tab-btn" onclick="switchTab('oplog', this)">Oplog</button>
  <button class="tab-btn" onclick="switchTab('files', this)">Files</button>
  <button class="tab-btn" onclick="switchTab('inbox', this)">Inbox <span id="inbox-badge" style="display:none;background:#e74c3c;color:#fff;border-radius:9px;padding:1px 6px;font-size:.72rem;margin-left:3px"></span></button>
  <button class="tab-btn" onclick="switchTab('friends', this)">Friends <span id="friends-badge" style="display:none;background:#e74c3c;color:#fff;border-radius:9px;padding:1px 6px;font-size:.72rem;margin-left:3px"></span></button>
  <button class="tab-btn" onclick="switchTab('logs', this)">Logs</button>
</div>

<!-- Memory tab -->
<div class="tab-panel active" id="tab-memory">
  <div class="search-bar">
    <input type="search" id="memory-search" placeholder="🔍 キーワード検索..." oninput="onSearchInput(this.value)">
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="setFilter('全て', this)">全て</button>
  </div>
  <div class="card-grid" id="memory-grid"></div>
</div>

<div class="toast" id="toast"></div>

<!-- CoreMem tab -->
<div class="tab-panel" id="tab-coremem">
  <div class="artifact-list" id="artifact-list"></div>
</div>

<!-- Import tab -->
<div class="tab-panel" id="tab-import">
  <div class="import-status" id="import-status">
    <span class="label">最終インポート：</span>
    <span class="value" id="import-status-name">読み込み中...</span>
    <span class="date" id="import-status-date"></span>
  </div>
  <div class="drop-zone" id="drop-zone">
    <div class="icon">📦</div>
    <p>ZIPファイルをここにドロップ</p>
    <input type="file" id="file-input" accept=".zip" style="display:none" onchange="handleFile(this.files[0])">
    <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">ファイルを選択</button>
  </div>
  <div style="margin:.75rem 0 0;display:flex;align-items:center;gap:.5rem;font-size:.85rem;color:#7a8a9a">
    <input type="checkbox" id="import-overwrite" style="accent-color:#7ec8e3;cursor:pointer">
    <label for="import-overwrite" style="cursor:pointer">上書きモード（既にインポート済みの会話も再処理する）</label>
  </div>
  <div id="import-result"></div>

  <!-- Batch progress panel (auto-shown after import / manual start) -->
  <div class="batch-progress-panel" id="batch-progress-panel" style="display:none">
    <div class="batch-progress-header">
      <span id="batch-status-label">要約生成</span>
      <span id="batch-status-pct">0%</span>
    </div>
    <div class="batch-progress-bar-wrap">
      <div class="batch-progress-bar" id="batch-progress-bar"></div>
    </div>
    <div class="batch-status-detail" id="batch-status-detail"></div>
  </div>

  <div class="batch-section">
    <h3>要約レイヤー生成</h3>
    <p>ZIPインポート後、<code>ANTHROPIC_API_KEY</code> が設定されていれば自動実行されます。<br>
    手動でLMStudioを使って実行することもできます。</p>
    <div style="display:flex;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="startBatch()">LMStudioで実行</button>
      <button class="btn btn-secondary" onclick="pollBatchStatus()">状態を確認</button>
    </div>
    <div class="batch-cmd-wrap">
      <span class="batch-cmd" id="batch-cmd">python scripts/generate_summary_layers.py</span>
      <button class="copy-btn" id="copy-btn" onclick="copyCmd()">コピー</button>
    </div>
  </div>
</div>

<!-- Oplog tab -->
<div class="tab-panel" id="tab-oplog">
  <div class="oplog-toolbar">
    <button class="btn btn-secondary" onclick="loadOplog()">再読み込み</button>
    <span class="oplog-count" id="oplog-count"></span>
  </div>
  <div class="oplog-list" id="oplog-list"></div>
</div>

<!-- Files tab -->
<div class="tab-panel" id="tab-files">
  <!-- Row 1: search + count -->
  <div class="files-toolbar">
    <input type="search" class="files-search" id="files-search" placeholder="🔍 ファイル名・会話名で検索..." oninput="onFilesSearch(this.value)">
    <span class="files-count" id="files-count"></span>
  </div>
  <!-- Row 2: extension filter buttons (populated dynamically) -->
  <div class="files-ext-bar" id="files-ext-bar"></div>
  <!-- Row 3: date range -->
  <div class="files-date-bar">
    <span>日付:</span>
    <input type="date" id="files-from" onchange="renderFiles()">
    <span>〜</span>
    <input type="date" id="files-to" onchange="renderFiles()">
    <button class="btn btn-secondary" style="padding:.25rem .6rem;font-size:.78rem" onclick="clearFilesDate()">クリア</button>
  </div>
  <!-- Column headers (sortable) -->
  <div class="files-header">
    <span class="files-col-hdr" onclick="sortFiles('filename')">ファイル名<span id="sort-filename"></span></span>
    <span class="files-col-hdr" onclick="sortFiles('conv_name')">会話<span id="sort-conv_name"></span></span>
    <span class="files-col-hdr" onclick="sortFiles('conv_date')">日付<span id="sort-conv_date"> ▼</span></span>
    <span class="files-col-hdr files-col-right" onclick="sortFiles('size')">サイズ<span id="sort-size"></span></span>
  </div>
  <div class="files-list" id="files-list"></div>
</div>

<!-- Inbox tab -->
<div class="tab-panel" id="tab-inbox">
  <div class="inbox-toolbar">
    <button class="btn btn-secondary" onclick="loadInbox()" style="padding:.25rem .65rem;font-size:.8rem">再読み込み</button>
    <button class="inbox-filter-btn active" id="inbox-filter-all" onclick="setInboxFilter('all', this)">すべて</button>
    <button class="inbox-filter-btn" id="inbox-filter-chat" onclick="setInboxFilter('chat', this)">→ chat</button>
    <button class="inbox-filter-btn" id="inbox-filter-code" onclick="setInboxFilter('code', this)">→ code</button>
    <span id="inbox-count" style="font-size:.8rem;color:#5a6a7a;margin-left:auto"></span>
  </div>
  <div class="inbox-list" id="inbox-list"></div>
  <div class="inbox-detail" id="inbox-detail">
    <div class="inbox-detail-title" id="inbox-detail-title"></div>
    <div class="inbox-detail-meta" id="inbox-detail-meta"></div>
    <div class="inbox-actions" id="inbox-actions"></div>
    <div class="inbox-detail-body" id="inbox-detail-body"></div>
  </div>
</div>

<!-- Friends tab -->
<div class="tab-panel" id="tab-friends">
  <div class="friends-toolbar">
    <button class="btn btn-secondary" onclick="loadFriends()" style="padding:.25rem .65rem;font-size:.8rem">再読み込み</button>
    <a href="/register" target="_blank" class="btn btn-secondary" style="padding:.25rem .65rem;font-size:.8rem;text-decoration:none">登録ページを開く</a>
  </div>

  <div class="friends-section" id="friends-pending-section">
    <h3>申請中 <span id="friends-pending-count" style="color:#f39c12"></span></h3>
    <div id="friends-pending-list"></div>
  </div>

  <div class="friends-section" id="friends-active-section">
    <h3>承認済み <span id="friends-active-count" style="color:#2ecc71"></span></h3>
    <div id="friends-active-list"></div>
  </div>

  <div class="friends-section" id="friends-revoked-section" style="display:none">
    <h3 style="color:#5a6a7a">失効済み</h3>
    <div id="friends-revoked-list"></div>
  </div>
</div>

<!-- Logs tab -->
<div class="tab-panel" id="tab-logs" style="padding:0; height: calc(100vh - 88px); overflow: hidden;">
  <iframe id="logs-frame" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Floating TOP button -->
<button class="top-btn" id="top-btn" onclick="scrollToTop()">↑ TOP</button>

<script>
const API = window.location.origin;
let allEntries = [];
let currentFilter = '全て';
let searchKeyword = '';
let searchTimer = null;

// ── marked.js: external links open in new tab ─────────────────────────
function renderMarkdown(content) {
  const html = marked.parse(content || '');
  return html.replace(/<a href="/g, '<a target="_blank" rel="noopener noreferrer" href="');
}

// ── Auth ─────────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('mio_token') || ''; }

function saveToken() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  localStorage.setItem('mio_token', t);
  document.getElementById('auth-overlay').style.display = 'none';
  loadMemory();
  loadInboxBadge();
  loadFriendsBadge();
}

async function loadInboxBadge() {
  try {
    const res = await apiFetch('/api/inbox?full=true');
    _inboxData = (await res.json()).sort((a, b) => b.created_at.localeCompare(a.created_at));
    updateInboxBadge();
  } catch(e) {}
}

function resetToken() {
  localStorage.removeItem('mio_token');
  document.getElementById('token-input').value = '';
  document.getElementById('auth-overlay').style.display = 'flex';
}

document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveToken();
});

// ── API ───────────────────────────────────────────────────────────────
async function apiFetch(path, options = {}) {
  const res = await fetch(API + path, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + getToken(), ...(options.headers || {}) }
  });
  if (res.status === 401) { resetToken(); throw new Error('401'); }
  return res;
}

// ── Tabs ──────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'memory')    loadMemory();
  if (name === 'coremem')   loadCoreMem();
  if (name === 'import')    { loadImportStatus(); pollBatchStatus(); }
  if (name === 'oplog')     loadOplog();
  if (name === 'files')     loadFiles();
  if (name === 'inbox')     loadInbox();
  if (name === 'friends')   loadFriends();
  if (name === 'logs') {
    const frame = document.getElementById('logs-frame');
    if (!frame.src || frame.src === window.location.href) frame.src = '/logs.html';
  }
}

// ── Memory ────────────────────────────────────────────────────────────
async function loadMemory() {
  const grid = document.getElementById('memory-grid');
  grid.innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    let res;
    if (searchKeyword) {
      res = await apiFetch('/api/memory/search?q=' + encodeURIComponent(searchKeyword));
    } else {
      res = await apiFetch('/api/memory/index');
    }
    allEntries = await res.json();
    renderFilterBar();
    renderCards();
  } catch(e) {
    if (e.message !== '401') grid.innerHTML = '<div class="empty">取得失敗</div>';
  }
}

function onSearchInput(val) {
  clearTimeout(searchTimer);
  searchKeyword = val.trim();
  searchTimer = setTimeout(() => loadMemory(), 300);
}

function renderFilterBar() {
  const counts = {};
  for (const e of allEntries) {
    for (const t of (e.tags || [])) {
      counts[t] = (counts[t] || 0) + 1;
    }
  }
  const topTags = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([t]) => t);
  const bar = document.getElementById('filter-bar');
  bar.innerHTML =
    `<button class="filter-btn${currentFilter === '全て' ? ' active' : ''}" onclick="setFilter('全て', this)">全て</button>` +
    topTags.map(t =>
      `<button class="filter-btn${currentFilter === t ? ' active' : ''}" onclick="setFilter('${esc(t)}', this)">${esc(t)}</button>`
    ).join('');
}

function setFilter(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards() {
  const grid = document.getElementById('memory-grid');
  const entries = currentFilter === '全て'
    ? allEntries
    : allEntries.filter(e => (e.tags || []).includes(currentFilter));

  if (!entries.length) {
    grid.innerHTML = '<div class="empty">エントリなし</div>';
    return;
  }

  grid.innerHTML = entries.map(e => {
    const imp  = e.importance || 'normal';
    const date = (e.created_at || '').slice(0, 16).replace('T', ' ');
    const tags = (e.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    return `
      <div class="card${e.deleted ? ' deleted' : ''}" onclick="openMemory('${esc(e.id)}')">
        <div class="card-title"><span class="dot dot-${imp}"></span>${esc(e.title)}</div>
        <div class="card-meta">${date}</div>
        <div class="card-tags">${tags}</div>
        <div class="card-footer">
          <button class="btn-link"   onclick="shareMemory('${esc(e.id)}', event)">リンク</button>
          <button class="btn-delete" onclick="deleteMemory('${esc(e.id)}', event)">削除</button>
        </div>
      </div>`;
  }).join('');
}

async function openMemory(id) {
  try {
    const res = await apiFetch('/api/memory/' + id);
    const e = await res.json();
    const date = (e.created_at || '').slice(0, 16).replace('T', ' ');
    document.getElementById('modal-title').textContent = e.title || '';
    document.getElementById('modal-meta').textContent =
      `${date}　${(e.tags || []).join(' · ')}　importance: ${e.importance || 'normal'}`;
    const body = document.getElementById('modal-body');
    body.className = 'modal-body';
    body.textContent = e.body || '';
    openModal();
  } catch {}
}

async function deleteMemory(id, event) {
  event.stopPropagation();
  if (!confirm('このエントリを削除しますか？')) return;
  try {
    await apiFetch('/api/memory/' + id, { method: 'DELETE' });
    loadMemory();
  } catch {}
}

async function shareMemory(id, event) {
  event.stopPropagation();
  try {
    const res = await apiFetch('/api/share-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ entry_id: id })
    });
    const data = await res.json();
    await navigator.clipboard.writeText(data.url);
    showToast('URLをコピーしました');
  } catch { showToast('コピー失敗'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── CoreMem (UserCoreMemory) ───────────────────────────────────────────
async function loadCoreMem() {
  const list = document.getElementById('artifact-list');
  list.innerHTML = '<div class="empty">読み込み中...</div>';
  try {
    const res = await apiFetch('/api/coremem');
    const items = await res.json();
    if (!items.length) { list.innerHTML = '<div class="empty">UserCoreMemoryなし</div>'; return; }
    list.innerHTML = items.map(a => {
      const date = (a.updated_at || '').slice(0, 16).replace('T', ' ');
      const ver  = a.version != null ? String(a.version).padStart(3, '0') : '---';
      return `
        <div class="artifact-item" onclick="openArtifact('${esc(a.name)}')">
          <span class="artifact-name">${esc(a.name)}</span>
          <span class="artifact-ver">v${ver}</span>
          <span class="artifact-date">${date}</span>
          <button class="del-btn" onclick="deleteArtifact('${esc(a.name)}', event)" title="削除">✕</button>
        </div>`;
    }).join('');
  } catch(e) {
    if (e.message !== '401') list.innerHTML = '<div class="empty">取得失敗</div>';
  }
}

async function deleteArtifact(name, event) {
  event.stopPropagation();
  if (!confirm(`「${name}」を削除しますか？（全バージョン削除）`)) return;
  try {
    await apiFetch('/api/coremem/' + name, { method: 'DELETE' });
    loadCoreMem();
  } catch {}
}

async function openArtifact(name) {
  try {
    const res = await apiFetch('/api/coremem/' + name);
    const a = await res.json();
    document.getElementById('modal-title').textContent = a.name || name;
    document.getElementById('modal-meta').textContent =
      `version: ${a.version != null ? a.version : 'latest'}`;
    const body = document.getElementById('modal-body');
    if (name.endsWith('.md')) {
      body.className = 'modal-body md-body';
      body.innerHTML = renderMarkdown(a.content || '');
    } else {
      body.className = 'modal-body';
      body.textContent = a.content || '';
    }
    openModal();
  } catch {}
}

// ── Import ────────────────────────────────────────────────────────────
async function loadImportStatus() {
  try {
    const res  = await apiFetch('/api/import-status');
    const data = await res.json();
    const nameEl = document.getElementById('import-status-name');
    const dateEl = document.getElementById('import-status-date');
    if (data.last_filename) {
      nameEl.textContent = data.last_filename;
      const m = data.last_filename.match(/(\d{4})(\d{2})(\d{2})/);
      const dateStr = m ? `${m[1]}-${m[2]}-${m[3]}` : (data.imported_at || '').slice(0, 10);
      dateEl.textContent = dateStr;
    } else {
      nameEl.textContent = 'インポート履歴なし';
      dateEl.textContent = '';
    }
  } catch(e) {
    if (e.message !== '401') {
      document.getElementById('import-status-name').textContent = '取得失敗';
    }
  }
}

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

async function handleFile(file) {
  if (!file || !file.name.toLowerCase().endsWith('.zip')) {
    showResult('<span class="result-err">ZIPファイルを選択してください</span>');
    return;
  }
  showResult('<span class="spinner"></span>アップロード中...');
  try {
    const overwrite = document.getElementById('import-overwrite')?.checked ? 'true' : 'false';
    const form = new FormData();
    form.append('file', file);
    form.append('overwrite', overwrite);
    const res  = await apiFetch('/import', { method: 'POST', body: form });
    const data = await res.json();
    if (res.ok) {
      const convPart = data.conversations_saved != null ? ` / 会話保存: ${data.conversations_saved}件` : '';
      const artPart  = data.artifacts_extracted  != null ? ` / 抽出ファイル: ${data.artifacts_extracted}件` : '';
      showResult(`<span class="result-ok">✓ imported: ${data.imported}件 / skipped: ${data.skipped}件${convPart}${artPart}</span>`);
      // Poll batch status (auto-batch may have started)
      setTimeout(pollBatchStatus, 1500);
    } else {
      showResult(`<span class="result-err">エラー: ${esc(String(data.error || res.status))}</span>`);
    }
  } catch(e) {
    if (e.message !== '401') showResult('<span class="result-err">通信エラー</span>');
  }
}

function showResult(html) {
  document.getElementById('import-result').innerHTML = html;
}

function copyCmd() {
  const cmd = document.getElementById('batch-cmd').textContent;
  navigator.clipboard.writeText(cmd).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'コピー済み';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Batch (summary generation) ────────────────────────────────────────
let batchPollTimer = null;

async function pollBatchStatus() {
  clearTimeout(batchPollTimer);
  try {
    const res = await apiFetch('/api/batch/status');
    const s   = await res.json();
    renderBatchStatus(s);
    if (s.running) batchPollTimer = setTimeout(pollBatchStatus, 2000);
  } catch {}
}

function renderBatchStatus(s) {
  const panel = document.getElementById('batch-progress-panel');
  if (!s || !s.started_at) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  const pct   = s.total > 0 ? Math.round(s.processed / s.total * 100) : 0;
  const label = s.running ? '⏳ 要約生成中...' : '✓ 完了';
  document.getElementById('batch-status-label').textContent = label;
  document.getElementById('batch-status-pct').textContent   = pct + '%';
  document.getElementById('batch-progress-bar').style.width = pct + '%';
  document.getElementById('batch-status-detail').textContent =
    `処理: ${s.processed}件 / スキップ: ${s.skipped || 0}件 / エラー: ${s.errors || 0}件 (合計: ${s.total}件)`;
}

async function startBatch() {
  clearTimeout(batchPollTimer);
  try {
    const res = await apiFetch('/api/batch/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ backend: 'lmstudio' })
    });
    if (res.ok) {
      showToast('要約生成を開始しました');
      setTimeout(pollBatchStatus, 500);
    } else {
      const d = await res.json().catch(() => ({}));
      showToast(d.error || '開始失敗');
    }
  } catch { showToast('通信エラー'); }
}

// ── Inbox ─────────────────────────────────────────────────────────────
let _inboxFilter = 'all';
let _inboxData   = [];

function setInboxFilter(filter, btn) {
  _inboxFilter = filter;
  document.querySelectorAll('.inbox-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderInbox();
}

async function loadInbox() {
  const list = document.getElementById('inbox-list');
  list.innerHTML = '<div class="inbox-empty">読み込み中...</div>';
  document.getElementById('inbox-detail').classList.remove('open');
  try {
    const res  = await apiFetch('/api/inbox?full=true');
    _inboxData = (await res.json()).sort((a, b) => b.created_at.localeCompare(a.created_at));
    updateInboxBadge();
    renderInbox();
  } catch(e) {
    if (e.message !== '401') list.innerHTML = '<div class="inbox-empty">取得失敗</div>';
  }
}

function updateInboxBadge() {
  const unread = _inboxData.filter(m => !m.read || m.persistent).length;
  const badge  = document.getElementById('inbox-badge');
  if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline'; }
  else             { badge.style.display = 'none'; }
}

function renderInbox() {
  const list    = document.getElementById('inbox-list');
  const filtered = _inboxFilter === 'all' ? _inboxData
    : _inboxData.filter(m => m.to === _inboxFilter);
  document.getElementById('inbox-count').textContent = `${filtered.length}件`;
  if (!filtered.length) { list.innerHTML = '<div class="inbox-empty">メッセージなし</div>'; return; }
  list.innerHTML = filtered.map(m => {
    const ts   = (m.created_at || '').slice(0, 19).replace('T', ' ');
    const cls  = m.persistent ? 'persistent' : (!m.read ? 'unread' : '');
    const badge = m.persistent
      ? '<span class="inbox-badge-persistent">常駐</span>'
      : (!m.read ? '<span class="inbox-badge-unread">未読</span>' : '');
    return `
      <div class="inbox-item ${cls}" onclick="openInboxMessage('${esc(m.id)}')">
        <div class="inbox-item-header">
          <span class="inbox-item-title">${esc(m.title)}</span>${badge}
        </div>
        <div class="inbox-item-meta">${esc(m.from || '?')} → ${esc(m.to || '?')} ・ ${esc(ts)}</div>
      </div>`;
  }).join('');
}

function _renderInboxDetail(msg) {
  const detail = document.getElementById('inbox-detail');
  const ts  = (msg.created_at || '').slice(0, 19).replace('T', ' ');
  const badges = [
    msg.persistent ? '<span class="inbox-badge-persistent" style="font-size:.78rem">常駐</span>' : '',
    !msg.read      ? '<span class="inbox-badge-unread"    style="font-size:.78rem">未読</span>' : '',
  ].filter(Boolean).join(' ');

  document.getElementById('inbox-detail-title').innerHTML = esc(msg.title) + (badges ? ' ' + badges : '');
  document.getElementById('inbox-detail-meta').textContent =
    `${msg.from || '?'} → ${msg.to || '?'} ・ ${ts}`;
  document.getElementById('inbox-detail-body').textContent = msg.body || '';

  const actions = document.getElementById('inbox-actions');
  const btns = [];
  if (!msg.read)  btns.push(`<button class="inbox-action-btn" onclick="inboxMarkRead('${esc(msg.id)}')">既読にする</button>`);
  if (msg.read)   btns.push(`<button class="inbox-action-btn" onclick="inboxMarkUnread('${esc(msg.id)}')">未読に戻す</button>`);
  if (!msg.persistent) btns.push(`<button class="inbox-action-btn" onclick="inboxSetPersistent('${esc(msg.id)}', true)">常駐ON</button>`);
  if (msg.persistent)  btns.push(`<button class="inbox-action-btn danger" onclick="inboxSetPersistent('${esc(msg.id)}', false)">常駐OFF</button>`);
  actions.innerHTML = btns.join('');

  detail.classList.add('open');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function openInboxMessage(id) {
  const msg = _inboxData.find(m => m.id === id);
  if (!msg) return;
  _renderInboxDetail(msg);
}

async function inboxMarkRead(id) {
  try {
    const res = await apiFetch(`/api/inbox/${id}/read`, { method: 'PATCH' });
    const updated = await res.json();
    Object.assign(_inboxData.find(m => m.id === id) || {}, updated);
    updateInboxBadge(); renderInbox(); _renderInboxDetail(updated);
  } catch(e) { showToast('通信エラー'); }
}

async function inboxMarkUnread(id) {
  try {
    const res = await apiFetch(`/api/inbox/${id}/unread`, { method: 'PATCH' });
    const updated = await res.json();
    Object.assign(_inboxData.find(m => m.id === id) || {}, updated);
    updateInboxBadge(); renderInbox(); _renderInboxDetail(updated);
  } catch(e) { showToast('通信エラー'); }
}

async function inboxSetPersistent(id, value) {
  try {
    const res = await apiFetch(`/api/inbox/${id}/persistent?value=${value}`, { method: 'PATCH' });
    const updated = await res.json();
    Object.assign(_inboxData.find(m => m.id === id) || {}, updated);
    updateInboxBadge(); renderInbox(); _renderInboxDetail(updated);
  } catch(e) { showToast('通信エラー'); }
}

// ── Files ─────────────────────────────────────────────────────────────
let filesData = [];
let filesTimer = null;
let filesSort = { col: 'conv_date', dir: 'desc' };
let filesExtFilter = '';

async function loadFiles(q = '') {
  const list = document.getElementById('files-list');
  list.innerHTML = '<div class="empty">読み込み中...</div>';
  document.getElementById('files-count').textContent = '';
  try {
    const url = '/api/conv-artifacts' + (q ? '?q=' + encodeURIComponent(q) : '');
    const res  = await apiFetch(url);
    filesData  = await res.json();
    renderExtFilters();
    renderFiles();
    renderSortIndicators();
  } catch(e) {
    if (e.message !== '401') list.innerHTML = '<div class="empty">取得失敗</div>';
  }
}

function renderExtFilters() {
  const exts = [...new Set(filesData.map(f => f.filename.split('.').pop().toLowerCase()))].sort();
  const bar = document.getElementById('files-ext-bar');
  bar.innerHTML =
    `<button class="filter-btn${filesExtFilter === '' ? ' active' : ''}" onclick="setExtFilter('', this)">全て</button>` +
    exts.map(e =>
      `<button class="filter-btn${filesExtFilter === e ? ' active' : ''}" onclick="setExtFilter('${esc(e)}', this)">.${esc(e)}</button>`
    ).join('');
}

function setExtFilter(ext, btn) {
  filesExtFilter = ext;
  document.querySelectorAll('#files-ext-bar .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFiles();
}

function renderFiles() {
  const list    = document.getElementById('files-list');
  const fromVal = document.getElementById('files-from')?.value || '';
  const toVal   = document.getElementById('files-to')?.value   || '';

  let data = filesData;
  if (filesExtFilter) {
    data = data.filter(f => f.filename.split('.').pop().toLowerCase() === filesExtFilter);
  }
  if (fromVal) data = data.filter(f => (f.conv_date || '') >= fromVal);
  if (toVal)   data = data.filter(f => (f.conv_date || '') <= toVal);

  data = [...data].sort((a, b) => {
    const col = filesSort.col;
    const va = col === 'size' ? (a.size || 0) : (a[col] || '');
    const vb = col === 'size' ? (b.size || 0) : (b[col] || '');
    if (va < vb) return filesSort.dir === 'asc' ? -1 : 1;
    if (va > vb) return filesSort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  document.getElementById('files-count').textContent = `${data.length}件`;
  if (!data.length) { list.innerHTML = '<div class="empty">ファイルなし</div>'; return; }
  list.innerHTML = data.map(f => {
    const size = f.size > 1024 ? `${(f.size/1024).toFixed(1)}KB` : `${f.size}B`;
    return `
      <div class="files-row" onclick="openFile('${esc(f.conv_uuid)}','${esc(f.filename)}','${esc(f.conv_name)}')">
        <span class="files-name">${esc(f.filename)}</span>
        <span class="files-conv">${esc(f.conv_name)}</span>
        <span class="files-date">${esc(f.conv_date)}</span>
        <span class="files-size">${size}</span>
      </div>`;
  }).join('');
}

function sortFiles(col) {
  if (filesSort.col === col) {
    filesSort.dir = filesSort.dir === 'desc' ? 'asc' : 'desc';
  } else {
    filesSort = { col, dir: (col === 'size') ? 'desc' : 'asc' };
  }
  renderFiles();
  renderSortIndicators();
}

function renderSortIndicators() {
  ['filename', 'conv_name', 'conv_date', 'size'].forEach(col => {
    const el = document.getElementById('sort-' + col);
    if (!el) return;
    el.textContent = filesSort.col === col ? (filesSort.dir === 'desc' ? ' ▼' : ' ▲') : '';
  });
}

function clearFilesDate() {
  document.getElementById('files-from').value = '';
  document.getElementById('files-to').value   = '';
  renderFiles();
}

// Extension→Prism language map
const EXT_LANG = {
  py: 'python', js: 'javascript', jsx: 'jsx', ts: 'typescript',
  tsx: 'jsx', css: 'css', sh: 'bash', bash: 'bash',
  json: 'json', yaml: 'yaml', yml: 'yaml', sql: 'sql',
};

async function openFile(convUuid, filename, convName) {
  try {
    const res  = await apiFetch(`/api/conv-artifacts/${convUuid}/${filename}`);
    const data = await res.json();
    document.getElementById('modal-title').textContent = filename;
    document.getElementById('modal-meta').textContent  = convName;
    const body = document.getElementById('modal-body');
    const ext  = filename.split('.').pop().toLowerCase();

    if (ext === 'md') {
      body.className = 'modal-body md-body';
      body.innerHTML = renderMarkdown(data.content || '');
    } else if (ext === 'html' || ext === 'htm') {
      body.className = 'modal-body';
      body.innerHTML = '';
      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;height:420px;border:none;border-radius:6px;background:#fff;';
      iframe.sandbox = 'allow-scripts allow-same-origin';
      iframe.srcdoc  = data.content || '';
      body.appendChild(iframe);
    } else {
      const lang = EXT_LANG[ext] || ext;
      body.className = 'modal-body';
      body.innerHTML = `<pre><code class="language-${lang}">${esc(data.content || '')}</code></pre>`;
      if (typeof Prism !== 'undefined') Prism.highlightElement(body.querySelector('code'));
    }
    openModal();
  } catch {}
}

function onFilesSearch(val) {
  clearTimeout(filesTimer);
  filesTimer = setTimeout(() => loadFiles(val.trim()), 300);
}

// ── Friends ───────────────────────────────────────────────────────────
let _friendsData = [];

async function loadFriendsBadge() {
  try {
    const res = await apiFetch('/api/friends');
    const list = await res.json();
    const pending = list.filter(f => f.status === 'pending').length;
    const badge = document.getElementById('friends-badge');
    if (pending > 0) { badge.textContent = pending; badge.style.display = 'inline'; }
    else             { badge.style.display = 'none'; }
  } catch(e) {}
}

async function loadFriends() {
  try {
    const res  = await apiFetch('/api/friends');
    _friendsData = await res.json();
    renderFriends();
  } catch(e) {
    if (e.message !== '401') showToast('Friends取得失敗');
  }
}

function renderFriends() {
  const pending  = _friendsData.filter(f => f.status === 'pending');
  const active   = _friendsData.filter(f => f.status === 'active');
  const revoked  = _friendsData.filter(f => f.status === 'revoked');

  // バッジ更新
  const badge = document.getElementById('friends-badge');
  if (pending.length > 0) { badge.textContent = pending.length; badge.style.display = 'inline'; }
  else                     { badge.style.display = 'none'; }

  document.getElementById('friends-pending-count').textContent = pending.length ? `(${pending.length})` : '';
  document.getElementById('friends-active-count').textContent  = active.length  ? `(${active.length})`  : '';

  document.getElementById('friends-pending-list').innerHTML = renderFriendsTable(pending, ['approve']);
  document.getElementById('friends-active-list').innerHTML  = renderFriendsTable(active,  ['revoke']);

  const revokedSection = document.getElementById('friends-revoked-section');
  if (revoked.length > 0) {
    revokedSection.style.display = '';
    document.getElementById('friends-revoked-list').innerHTML = renderFriendsTable(revoked, []);
  } else {
    revokedSection.style.display = 'none';
  }
}

function renderFriendsTable(list, actions) {
  if (!list.length) return '<div class="friends-empty">なし</div>';
  const rows = list.map(f => {
    const ts = (f.created_at || '').slice(0,19).replace('T',' ');
    const badge = `<span class="friends-badge-status friends-badge-${f.status}">${f.status}</span>`;
    const btns = [
      actions.includes('approve')
        ? `<button class="friends-btn" onclick="friendsApprove(${f.seq_no})">承認</button>` : '',
      actions.includes('revoke')
        ? `<button class="friends-btn danger" onclick="friendsRevoke(${f.seq_no})">失効</button>` : ''
    ].filter(Boolean).join(' ');
    return `<tr>
      <td style="color:#5a6a7a">#${f.seq_no}</td>
      <td>${esc(f.nickname)}</td>
      <td style="color:#7a8a9a">${esc(f.email)}</td>
      <td>${badge}</td>
      <td style="color:#5a6a7a;font-size:.75rem">${ts}</td>
      <td>${btns}</td>
    </tr>`;
  }).join('');
  return `<table class="friends-table">
    <thead><tr><th>#</th><th>ニックネーム</th><th>メール</th><th>状態</th><th>申請日時</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function friendsApprove(seq_no) {
  if (!confirm(`#${seq_no} を承認してメールを送信しますか？`)) return;
  try {
    const res  = await apiFetch(`/api/friends/${seq_no}/approve`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '承認失敗'); return; }
    showToast(data.email_sent ? '承認しメールを送信しました' : '承認しました（メール送信失敗）');
    loadFriends();
  } catch(e) { showToast('通信エラー'); }
}

async function friendsRevoke(seq_no) {
  if (!confirm(`#${seq_no} を失効しますか？接続できなくなります。`)) return;
  try {
    const res = await apiFetch(`/api/friends/${seq_no}/revoke`, { method: 'POST' });
    if (!res.ok) { showToast('失効失敗'); return; }
    showToast('失効しました');
    loadFriends();
  } catch(e) { showToast('通信エラー'); }
}

// ── Oplog ─────────────────────────────────────────────────────────────
let oplogData = [];

async function loadOplog() {
  const list = document.getElementById('oplog-list');
  list.innerHTML = '<div class="empty">読み込み中...</div>';
  document.getElementById('oplog-count').textContent = '';
  try {
    const res = await apiFetch('/api/oplog');
    oplogData = await res.json();
    renderOplog();
  } catch(e) {
    if (e.message !== '401') list.innerHTML = '<div class="empty">取得失敗</div>';
  }
}

function renderOplog() {
  const list  = document.getElementById('oplog-list');
  const items = [...oplogData].reverse();
  document.getElementById('oplog-count').textContent = `${items.length}件`;
  if (!items.length) { list.innerHTML = '<div class="empty">ログなし</div>'; return; }
  list.innerHTML = items.map((row, i) => {
    const ts  = (row.timestamp || '').slice(0, 19).replace('T', ' ');
    const op  = row.operation || '?';
    const idx = oplogData.length - 1 - i;
    return `
      <div class="oplog-row" onclick="openOplog(${idx})">
        <span class="oplog-ts">${esc(ts)}</span>
        <span class="op-badge op-${esc(op)}">${esc(op)}</span>
        <span class="oplog-id">${esc(row.entry_id || '')}</span>
      </div>`;
  }).join('');
}

function openOplog(idx) {
  const row = oplogData[idx];
  if (!row) return;
  const op     = row.operation || '?';
  const ts     = (row.timestamp || '').slice(0, 19).replace('T', ' ');
  const diff   = row.diff || {};
  const after  = diff.after  ? JSON.stringify(diff.after,  null, 2) : '（なし）';
  const before = diff.before ? JSON.stringify(diff.before, null, 2) : '（なし）';
  document.getElementById('modal-title').textContent = `[${op}] ${row.entry_id || ''}`;
  document.getElementById('modal-meta').textContent  = ts;
  const body = document.getElementById('modal-body');
  body.className = 'modal-body';
  body.textContent = diff.before
    ? `▼ after\n${after}\n\n▼ before\n${before}`
    : `▼ after\n${after}`;
  openModal();
}

// ── Modal ─────────────────────────────────────────────────────────────
function openModal()  { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── TOP button ────────────────────────────────────────────────────────
function scrollToTop() {
  const active = document.querySelector('.tab-panel.active');
  if (active) active.scrollTo({ top: 0, behavior: 'smooth' });
}

document.querySelectorAll('.tab-panel').forEach(panel => {
  panel.addEventListener('scroll', () => {
    const btn    = document.getElementById('top-btn');
    const active = document.querySelector('.tab-panel.active');
    if (active && active.scrollTop > 300) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });
});

// ── Util ──────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────
(async () => {
  const params      = new URLSearchParams(location.search);
  const sharedId    = params.get('id');
  const sharedToken = params.get('token');

  // ?token= だけの場合：APIトークンとして使ってログインスキップ
  if (sharedToken && !sharedId) {
    localStorage.setItem('mio_token', sharedToken);
  }

  if (sharedId && sharedToken) {
    try {
      const res = await fetch(API + '/api/share/' + sharedToken);
      if (res.ok) {
        const e = await res.json();
        document.getElementById('auth-overlay').style.display = 'none';
        const date = (e.created_at || '').slice(0, 16).replace('T', ' ');
        document.getElementById('modal-title').textContent = e.title || '';
        document.getElementById('modal-meta').textContent =
          `${date}　${(e.tags || []).join(' · ')}　importance: ${e.importance || 'normal'}`;
        const body = document.getElementById('modal-body');
        body.className = 'modal-body';
        body.textContent = e.body || '';
        openModal();
        return;
      }
    } catch {}
  }
  if (getToken()) {
    document.getElementById('auth-overlay').style.display = 'none';
    loadMemory();
    loadImportStatus();
    loadInboxBadge();
    loadFriendsBadge();
  }
})();
