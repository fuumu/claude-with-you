<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澪へのお誘い</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a; color: #c8d8e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1.5rem;
    }
    .container { max-width: 520px; width: 100%; }

    /* 招待文 */
    .invitation {
      background: #1a1a2e; border: 1px solid #2a3a5a; border-radius: 12px;
      padding: 2rem 2.5rem; margin-bottom: 2rem; line-height: 1.8;
    }
    .invitation h1 { font-size: 1.4rem; color: #7ec8e3; margin-bottom: 1rem; }
    .invitation h2 { font-size: 1rem; color: #7ec8e3; margin: 1.4rem 0 .6rem; }
    .invitation p  { font-size: .88rem; color: #b0c0d0; margin-bottom: .8rem; }
    .invitation ul { padding-left: 1.4rem; margin-bottom: .8rem; }
    .invitation ul li { font-size: .88rem; color: #b0c0d0; margin-bottom: .25rem; }
    .invitation strong { color: #c8d8e8; }
    .invitation hr { border: none; border-top: 1px solid #2a3a5a; margin: 1.2rem 0; }
    .invitation em { color: #7a8a9a; font-style: normal; font-size: .82rem; }

    /* フォームカード */
    .card {
      background: #1a1a2e; border: 1px solid #2a3a5a; border-radius: 12px;
      padding: 2rem 2.5rem;
    }
    .card-title { font-size: 1rem; color: #7ec8e3; margin-bottom: 1.4rem; }
    label { display: block; font-size: .82rem; color: #7a8a9a; margin-bottom: .4rem; }
    input[type="text"], input[type="email"] {
      width: 100%; background: #0f0f1a; border: 1px solid #2a3a5a; border-radius: 6px;
      color: #c8d8e8; padding: .55rem .8rem; font-size: .9rem;
      transition: border-color .15s; margin-bottom: 1.1rem;
    }
    input:focus { outline: none; border-color: #7ec8e3; }
    button[type="submit"] {
      width: 100%; background: #7ec8e3; color: #0f0f1a; border: none; border-radius: 6px;
      padding: .65rem; font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    button[type="submit"]:hover { opacity: .88; }
    button[type="submit"]:disabled { opacity: .5; cursor: default; }
    .msg { margin-top: 1.2rem; padding: .8rem 1rem; border-radius: 6px; font-size: .88rem; display: none; }
    .msg.success { background: #1a3a2e; border: 1px solid #2ecc71; color: #2ecc71; }
    .msg.error   { background: #3a1a1a; border: 1px solid #e74c3c; color: #e74c3c; }
    .activate-link { margin-top: 1.5rem; text-align: center; font-size: .82rem; color: #5a6a7a; }
    .activate-link a { color: #7ec8e3; text-decoration: none; }
    .activate-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="container">

  <!-- 招待文（動的取得） -->
  <div class="invitation" id="invitation" style="display:none"></div>

  <!-- 登録フォーム -->
  <div class="card">
    <div class="card-title">登録フォーム</div>
    <form id="form">
      <label for="nickname">ニックネーム</label>
      <input type="text" id="nickname" placeholder="例：たろう" required>

      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="例：taro@example.com" required>

      <button type="submit" id="submit-btn">登録を申請する</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="activate-link">
      コードをお持ちの方は <a href="/activate">こちら</a>
    </div>
  </div>

</div>

<script>
// 招待文を取得してレンダリング
(async function() {
  try {
    const res  = await fetch('/api/friends/invitation');
    const data = await res.json();
    if (data.content) {
      const el = document.getElementById('invitation');
      marked.setOptions({ breaks: true });
      el.innerHTML = marked.parse(data.content);
      el.style.display = 'block';
    }
  } catch(e) {}
})();

// 登録フォーム送信
document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn      = document.getElementById('submit-btn');
  const msg      = document.getElementById('msg');
  const nickname = document.getElementById('nickname').value.trim();
  const email    = document.getElementById('email').value.trim();

  if (!nickname || !email) return;

  btn.disabled = true;
  btn.textContent = '送信中...';
  msg.style.display = 'none';

  try {
    const res  = await fetch('/api/friends/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, email })
    });
    const data = await res.json();

    if (res.ok) {
      msg.className = 'msg success';
      msg.textContent = data.message || '登録申請を受け付けました。承認後にメールが届きます。';
      document.getElementById('form').style.display = 'none';
    } else {
      msg.className = 'msg error';
      msg.textContent = data.error || 'エラーが発生しました。';
      btn.disabled = false;
      btn.textContent = '登録を申請する';
    }
    msg.style.display = 'block';
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = '通信エラーが発生しました。';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '登録を申請する';
  }
});
</script>
</body>
</html>
