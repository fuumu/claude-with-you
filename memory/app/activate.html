<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澪への接続コード入力</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f1a; color: #c8d8e8;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #1a1a2e; border: 1px solid #2a3a5a; border-radius: 12px;
      padding: 2rem 2.5rem; max-width: 480px; width: 100%;
    }
    h1 { font-size: 1.3rem; color: #7ec8e3; margin-bottom: .4rem; }
    .subtitle { font-size: .85rem; color: #5a6a7a; margin-bottom: 1.8rem; line-height: 1.6; }
    label { display: block; font-size: .82rem; color: #7a8a9a; margin-bottom: .4rem; }
    input[type="text"] {
      width: 100%; background: #0f0f1a; border: 1px solid #2a3a5a; border-radius: 6px;
      color: #c8d8e8; padding: .55rem .8rem; font-size: .9rem; font-family: monospace;
      transition: border-color .15s; margin-bottom: 1.1rem;
    }
    input:focus { outline: none; border-color: #7ec8e3; }
    button[type="submit"] {
      width: 100%; background: #7ec8e3; color: #0f0f1a; border: none; border-radius: 6px;
      padding: .65rem; font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s;
    }
    button[type="submit"]:hover { opacity: .88; }
    button[type="submit"]:disabled { opacity: .5; cursor: default; }
    .msg { margin-top: 1.2rem; padding: .8rem 1rem; border-radius: 6px; font-size: .88rem; display: none; }
    .msg.error { background: #3a1a1a; border: 1px solid #e74c3c; color: #e74c3c; }

    .result { display: none; margin-top: 1.5rem; }
    .result h2 { font-size: 1rem; color: #7ec8e3; margin-bottom: .8rem; }
    .result p  { font-size: .85rem; color: #7a8a9a; margin-bottom: .8rem; line-height: 1.6; }
    .mcp-url-box {
      background: #0f0f1a; border: 1px solid #2a3a5a; border-radius: 6px;
      padding: .7rem 1rem; font-family: monospace; font-size: .82rem; color: #c8d8e8;
      word-break: break-all; margin-bottom: .8rem;
    }
    .copy-btn {
      background: none; border: 1px solid #2a3a5a; border-radius: 4px;
      color: #7a8a9a; padding: .3rem .8rem; font-size: .78rem; cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .copy-btn:hover { border-color: #7ec8e3; color: #7ec8e3; }
    .steps { margin-top: 1.2rem; }
    .steps h3 { font-size: .88rem; color: #7a8a9a; margin-bottom: .6rem; }
    .steps ol { padding-left: 1.3rem; font-size: .83rem; color: #7a8a9a; line-height: 1.8; }
    .register-link { margin-top: 1.5rem; text-align: center; font-size: .82rem; color: #5a6a7a; }
    .register-link a { color: #7ec8e3; text-decoration: none; }
    .register-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <h1>接続コードの入力</h1>
  <p class="subtitle">メールに届いたコードを入力してください。<br>澪との接続URLが発行されます。</p>

  <div id="input-section">
    <form id="form">
      <label for="token">接続コード</label>
      <input type="text" id="token" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" required>
      <button type="submit" id="submit-btn">確認する</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <div class="result" id="result">
    <h2 id="result-greeting"></h2>
    <p>あなたの澪 MCP URL です：</p>
    <div class="mcp-url-box" id="mcp-url"></div>
    <button class="copy-btn" onclick="copyUrl()">URLをコピー</button>

    <div class="steps">
      <h3>接続手順（claude.ai）</h3>
      <ol>
        <li>claude.ai を開く</li>
        <li>設定 → Connectors（または接続）</li>
        <li>「カスタム MCP を追加」</li>
        <li>上記 URL を貼り付けて保存</li>
        <li>新しいチャットを開始する</li>
      </ol>
    </div>
  </div>

  <div class="register-link">
    まだ登録していない方は <a href="/register">こちら</a>
  </div>
</div>

<script>
let _mcpUrl = '';

document.getElementById('form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn   = document.getElementById('submit-btn');
  const msg   = document.getElementById('msg');
  const token = document.getElementById('token').value.trim();
  if (!token) return;

  btn.disabled = true;
  btn.textContent = '確認中...';
  msg.style.display = 'none';

  try {
    const res  = await fetch('/api/friends/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await res.json();

    if (res.ok) {
      _mcpUrl = data.mcp_url;
      document.getElementById('result-greeting').textContent =
        `${data.nickname}さん、準備ができました！`;
      document.getElementById('mcp-url').textContent = data.mcp_url;
      document.getElementById('input-section').style.display = 'none';
      document.getElementById('result').style.display = 'block';
    } else {
      msg.className = 'msg error';
      msg.textContent = data.error || '無効なコードです。';
      msg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '確認する';
    }
  } catch (err) {
    msg.className = 'msg error';
    msg.textContent = '通信エラーが発生しました。';
    msg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '確認する';
  }
});

function copyUrl() {
  if (!_mcpUrl) return;
  navigator.clipboard.writeText(_mcpUrl).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'コピーしました！';
    setTimeout(() => { btn.textContent = 'URLをコピー'; }, 2000);
  });
}

// URLパラメータにトークンがあれば自動入力
const params = new URLSearchParams(location.search);
const t = params.get('token');
if (t) document.getElementById('token').value = t;
</script>
</body>
</html>
